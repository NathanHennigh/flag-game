   the View/Text/Touchable/Img/Row/Scroll primitives below map 1:1 to RN, and
   the <Icon> component's inline SVG maps to react-native-svg. Swap those shims
   and the screens/logic carry over unchanged.
   ──────────────────────────────────────────────────────────────────────────*/

/* ---------- platform primitives (the only things you swap for Expo) ------- */
const flat = (s) => (Array.isArray(s) ? Object.assign({}, ...s.map(flat)) : s || {});
const View = ({ style, children, ...p }) => (
  <div style={{ display: "flex", flexDirection: "column", boxSizing: "border-box", ...flat(style) }} {...p}>{children}</div>
);
const Row = ({ style, children, ...p }) => (
  <View style={[{ flexDirection: "row" }, style]} {...p}>{children}</View>
);
const Text = ({ style, children, ...p }) => (
  <span style={{ boxSizing: "border-box", ...flat(style) }} {...p}>{children}</span>
);
const Touchable = ({ style, children, onPress, disabled, ...p }) => (
  <button
    disabled={disabled}
    onClick={onPress}
    style={{
      display: "flex", flexDirection: "column", boxSizing: "border-box",
      border: "none", background: "transparent", padding: 0, margin: 0,
      font: "inherit", textAlign: "left", color: "inherit",
      cursor: disabled ? "default" : "pointer", userSelect: "none",
      WebkitTapHighlightColor: "transparent", transition: "transform .12s ease",
      ...flat(style),
    }}
    {...p}
  >{children}</button>
);
const Img = ({ uri, style, ...p }) => (
  <img src={uri} alt="" draggable={false} style={{ display: "block", ...flat(style) }} {...p} />
);
const Scroll = ({ style, contentStyle, children }) => (
  <div style={{ flex: 1, minHeight: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", ...flat(style) }}>
    <div style={{ display: "flex", flexDirection: "column", ...flat(contentStyle) }}>{children}</div>
  </div>
);

/* ---------- helpers -------------------------------------------------------- */
const shuffle = (a) => { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; };
const pick = (a) => a[Math.floor(Math.random() * a.length)];

function weightedPick(pool, weights, recent) {
  let available = pool.filter((c) => !recent.includes(c.code));
  if (available.length === 0) available = pool;
  const items = available.map((c) => ({ item: c, w: weights[c.code] || 1 }));
  const total = items.reduce((s, i) => s + i.w, 0);
  let r = Math.random() * total;
  for (const i of items) { r -= i.w; if (r <= 0) return i.item; }
  return items[items.length - 1].item;
}

function getPool(config) {
  let base = COUNTRIES;
  if (config.scope !== "world" && config.scope !== "similar")
    base = COUNTRIES.filter((c) => c.continent === config.scope);
  let pool = base;
  if (config.difficulty === "easy") pool = base.filter((c) => c.diff === 1);
  else if (config.difficulty === "medium") pool = base.filter((c) => c.diff <= 2);
  if (pool.length < 8) pool = base; // small-continent safety net
  return pool;
}

function makeQuestion(config, recent, weights = {}) {
  const n = NUM_OPTIONS[config.difficulty];
  if (config.scope === "similar") {
    const group = pick(SIMILAR_GROUPS).map((c) => BY_CODE[c]).filter(Boolean);
    const target = weightedPick(group, weights, recent);
    let opts = shuffle(group.filter((c) => c.code !== target.code)).slice(0, n - 1);
    if (opts.length < n - 1) {
      const sameCont = shuffle(COUNTRIES.filter((c) => c.continent === target.continent && c.code !== target.code && !opts.includes(c)));
      const fillers = sameCont.concat(shuffle(COUNTRIES.filter((c) => c.code !== target.code && !opts.includes(c))));
      opts = opts.concat(fillers.slice(0, n - 1 - opts.length));
    }
    return { target, options: shuffle([target, ...opts]), type: config.type };
  }
  const pool = getPool(config);
  const target = weightedPick(pool, weights, recent);
  const distractors = shuffle(pool.filter((c) => c.code !== target.code)).slice(0, n - 1);
  return { target, options: shuffle([target, ...distractors]), type: config.type };
}

/* ---------- QUIZ ----------------------------------------------------------- */
function Quiz({ config, onFinish, onQuit, srsWeights, onSrsUpdate }) {
  const recent = useRef([]);
  const [question, setQuestion] = useState(() => {
    const q = makeQuestion(config, [], config.srs ? srsWeights : {});
    recent.current = [q.target.code];
    return q;
  });
  const [score, setScore] = useState(0);
  const [lives, setLives] = useState(3);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [timeLeft, setTimeLeft] = useState(60);
  const [tick, setTick] = useState(0);
  const [showConfidence, setShowConfidence] = useState(false);

  const answersRef = useRef([]); const scoreRef = useRef(0); const done = useRef(false);
  useEffect(() => { answersRef.current = answers; }, [answers]);
  useEffect(() => { scoreRef.current = score; }, [score]);

  const finish = () => {
    if (done.current) return;
    done.current = true;
    onFinish({ score: scoreRef.current, total: answersRef.current.length, answers: answersRef.current });
  };

  useEffect(() => {
    if (config.mode !== "timeAttack" || done.current) return;
    if (timeLeft <= 0) { finish(); return; }
    const t = setTimeout(() => setTimeLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, config.mode]);

  const next = () => {
    const q = makeQuestion(config, recent.current, config.srs ? srsWeights : {});
    recent.current = [q.target.code, ...recent.current].slice(0, 10);
    setQuestion(q); setSelected(null); setShowConfidence(false); setTick((t) => t + 1);
  };

  const handleConfidence = (level) => {
    const multipliers = { hard: 1.8, good: 0.6, easy: 0.3 };
    onSrsUpdate(question.target.code, multipliers[level]);
    setShowConfidence(false);
    answersRef.current = answers; scoreRef.current = score;
    if (config.mode === "classic" && answers.length >= CLASSIC_TOTAL) return finish();
    if (config.mode === "timeAttack" && timeLeft <= 0) return finish();
    next();
  };

  const answer = (country) => {
    if (selected || done.current) return;
    const correct = country.code === question.target.code;
    setSelected(country);
    const newAnswers = [...answers, { target: question.target, picked: country, correct }];
    setAnswers(newAnswers);
    const newScore = score + (correct ? 1 : 0);
    if (correct) setScore(newScore);
    const newLives = !correct && config.mode === "survival" ? lives - 1 : lives;
    if (newLives !== lives) setLives(newLives);

    if (correct && config.srs) {
      setShowConfidence(true);
    } else {
      if (!correct && config.srs) onSrsUpdate(question.target.code, 2.5);
      setTimeout(() => {
        answersRef.current = newAnswers; scoreRef.current = newScore;
        if (config.mode === "classic" && newAnswers.length >= CLASSIC_TOTAL) return finish();
        if (config.mode === "survival" && newLives <= 0) return finish();
        if (config.mode === "timeAttack" && timeLeft <= 0) return finish();
        next();
      }, 820);
    }
  };

  const optColor = (c) => {
    if (!selected) return null;
    if (c.code === question.target.code) return "correct";
    if (c.code === selected.code) return "wrong";
    return null;
  };

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <Row style={styles.qTop}>
        <Touchable className="press" onPress={onQuit} style={styles.iconBtn}><Icon name="x" size={18} color={T.navy} stroke={2.6} /></Touchable>
        <View style={{ flex: 1, alignItems: "center" }}>
          {config.mode === "classic" && <Text style={styles.statusTxt}>QUESTION {String(answers.length + 1).padStart(2, "0")} / {CLASSIC_TOTAL}</Text>}
          {config.mode === "timeAttack" && (
            <Row style={{ alignItems: "center", gap: 7 }}>
              <Icon name="stopwatch" size={17} color={timeLeft <= 10 ? T.red : T.navy} stroke={2.1} />
              <Text style={[styles.statusTxt, timeLeft <= 10 && { color: T.red }]}>{fmtTime(timeLeft)}</Text>
            </Row>
          )}
          {config.mode === "survival" && (
            <Row style={{ gap: 6 }}>
              {[0, 1, 2].map((i) => (
                <Icon key={i} name={i < lives ? "heartFilled" : "heart"} size={19} color={i < lives ? T.red : T.outlineVar} stroke={2} />
              ))}
            </Row>
          )}
        </View>
        <View style={styles.scoreChip}><Text style={styles.scoreTxt}>{score}</Text></View>
      </Row>

      {config.mode === "classic" && (
        <Row style={styles.progressTrack}>
          {Array.from({ length: CLASSIC_TOTAL }).map((_, i) => (
            <View key={i} style={[styles.progressSeg, i < answers.length && styles.progressSegOn]} />
          ))}
        </Row>
      )}
      {config.mode === "timeAttack" && (
        <View style={styles.barTrack}><View style={[styles.barFill, { width: `${(timeLeft / 60) * 100}%`, background: timeLeft <= 10 ? T.red : T.navy }]} /></View>
      )}

      <Scroll contentStyle={{ padding: 20, paddingTop: 22, gap: 20, alignItems: "center" }}>
        <div key={tick} className="fadeIn" style={{ width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 20 }}>
          {question.type === "flagToName" ? (
            <React.Fragment>
              <Text style={styles.prompt}>IDENTIFY THE FLAG</Text>
              <View style={styles.flagFrame}><Img uri={flagUrl(question.target.code, 640)} style={styles.heroFlag} /></View>
              <View style={{ width: "100%", gap: 10, marginTop: 2 }}>
                {question.options.map((c, idx) => {
                  const st = optColor(c);
                  return (
                    <Touchable key={c.code} className="press" disabled={!!selected} onPress={() => answer(c)}
                      style={[styles.answer, st === "correct" && styles.answerCorrect, st === "wrong" && styles.answerWrong]}>
                      <Row style={{ alignItems: "center", gap: 12 }}>
                        <View style={[styles.letter, st && styles.letterOn]}>
                          <Text style={[styles.letterTxt, st && { color: st === "correct" ? T.teal : T.red }]}>{String.fromCharCode(65 + idx)}</Text>
                        </View>
                        <Text style={[styles.answerTxt, st && { color: "#fff" }]}>{c.name}</Text>
                        <View style={{ flex: 1 }} />
                        {st === "correct" && <Icon name="check" size={20} color="#fff" stroke={3} />}
                        {st === "wrong" && <Icon name="x" size={19} color="#fff" stroke={3} />}
                      </Row>
                    </Touchable>
                  );
                })}
              </View>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <Text style={styles.prompt}>PICK THE FLAG OF</Text>
              <Text style={styles.heroName}>{question.target.name}</Text>
              <Row style={{ flexWrap: "wrap", gap: 12, justifyContent: "center", alignItems: "flex-start", marginTop: 2 }}>
                {question.options.map((c) => {
                  const st = optColor(c);
                  return (
                    <Touchable key={c.code} className="press" disabled={!!selected} onPress={() => answer(c)}
                      style={[styles.tile, st === "correct" && styles.tileCorrect, st === "wrong" && styles.tileWrong]}>
                      <Img uri={flagUrl(c.code, 320)} style={styles.tileImg} />
                      {st && (
                        <View style={[styles.tileBadge, { background: st === "correct" ? T.teal : T.red }]}>
                          <Icon name={st === "correct" ? "check" : "x"} size={14} color="#fff" stroke={3} />
                        </View>
                      )}
                    </Touchable>
                  );
                })}
              </Row>
            </React.Fragment>
          )}

          {selected && !showConfidence && (
            <View style={[styles.feedbackBox, { background: selected.code === question.target.code ? T.teal : T.red }]}>
              <Text style={styles.feedbackTxt}>{selected.code === question.target.code ? "CORRECT" : `INCORRECT - ${question.target.name.toUpperCase()}`}</Text>
            </View>
          )}

          {showConfidence && (
            <View style={styles.confWrap} className="popIn">
              <Text style={styles.confLabel}>RATE THIS FLAG</Text>
              <Row style={{ gap: 9 }}>
                <Touchable className="press" onPress={() => handleConfidence("hard")} style={[styles.confBtn, { background: T.redSoft }]}>
                  <Text style={styles.confTxt}>TRICKY</Text><Text style={styles.confSub}>soon</Text>
                </Touchable>
                <Touchable className="press" onPress={() => handleConfidence("good")} style={[styles.confBtn, { background: T.blueFixed }]}>
                  <Text style={styles.confTxt}>GOOD</Text><Text style={styles.confSub}>later</Text>
                </Touchable>
                <Touchable className="press" onPress={() => handleConfidence("easy")} style={[styles.confBtn, { background: T.tealFixed }]}>
                  <Text style={styles.confTxt}>EASY</Text><Text style={styles.confSub}>rarely</Text>
                </Touchable>
              </Row>
            </View>
          )}
        </div>
        <View style={{ height: 24 }} />
      </Scroll>
    </View>
  );
}

/* ---------- RESULTS -------------------------------------------------------- */
function Results({ result, isNewBest, config, onAgain, onHome }) {
  const acc = accuracy(result);
  const grade = acc >= 90 ? "EXCELLENT" : acc >= 70 ? "GOOD" : acc >= 50 ? "OK" : "KEEP PRACTICING";
  const dirLabel = DIRECTIONS.find((d) => d.key === config.type)?.label;
  const modeLabel = STYLES_MODE.find((m) => m.key === config.mode)?.label;
  const scopeLabel = SCOPES.find((s) => s.key === config.scope)?.label;
  const correct = result.answers.filter((a) => a.correct);
  const missed = result.answers.filter((a) => !a.correct);

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <Scroll contentStyle={{ padding: 20, gap: 18 }}>
        <View style={{ alignItems: "center", gap: 8, marginTop: 14 }}>
          <Text style={styles.resTitle}>RESULTS</Text>
          <Text style={styles.resLog}>{dirLabel} // {scopeLabel} // {config.difficulty} // {modeLabel}</Text>
        </View>

        <View style={styles.medalWrap} className="bobIn">
          <View style={styles.medalInner}>
            <Icon name="trophy" size={24} color={T.navy} stroke={2} />
            <Text style={styles.medalPct}>{acc}<Text style={styles.medalPctUnit}>%</Text></Text>
            <Text style={styles.medalLbl}>ACCURACY</Text>
          </View>
        </View>

        <View style={{ alignItems: "center", gap: 9 }}>
          <Text style={styles.grade}>{grade}</Text>
          {isNewBest && (
            <Row style={styles.newBest}><Icon name="starFilled" size={13} color={T.onNavy} /><Text style={styles.newBestTxt}>NEW RECORD</Text></Row>
          )}
        </View>

        <Row style={{ gap: 9 }}>
          <View style={[styles.statBox, { flex: 1 }]}>
            <Text style={[styles.statBig, { color: T.navy }]}>{result.score}<Text style={styles.statUnit}>{config.mode === "classic" ? `/${result.total}` : ""}</Text></Text>
            <Text style={styles.statLbl}>{config.mode === "classic" ? "SCORE" : "CORRECT"}</Text>
          </View>
          <View style={[styles.statBox, { flex: 1 }]}>
            <Text style={[styles.statBig, { color: T.red }]}>{result.total}</Text>
            <Text style={styles.statLbl}>ANSWERED</Text>
          </View>
          <View style={[styles.statBox, { flex: 1 }]}>
            <Text style={[styles.statBig, { color: T.teal }]}>{missed.length}</Text>
            <Text style={styles.statLbl}>TO REVIEW</Text>
          </View>
        </Row>

        {correct.length > 0 && (
          <Module label={`CORRECT // ${correct.length}`} tone="navy">
            {correct.map((a, i) => (
              <Row key={i} style={styles.revRow}>
                <View style={styles.revFlag}><Img uri={flagUrl(a.target.code, 80)} style={styles.revFlagImg} /></View>
                <View style={{ flex: 1, gap: 1 }}>
                  <Text style={styles.revName}>{a.target.name}</Text>
                  <Text style={styles.revStatus}>CORRECT</Text>
                </View>
                <Icon name="check" size={18} color={T.teal} stroke={3} />
              </Row>
            ))}
          </Module>
        )}
        {missed.length > 0 && (
          <Module label={`NEEDS REVIEW // ${missed.length}`} tone="red">
            {missed.map((a, i) => (
              <Row key={i} style={styles.revRow}>
                <View style={styles.revFlag}><Img uri={flagUrl(a.target.code, 80)} style={styles.revFlagImg} /></View>
                <View style={{ flex: 1, gap: 1 }}>
                  <Text style={[styles.revName, { color: T.red }]}>{a.target.name}</Text>
                  <Text style={[styles.revStatus, { color: T.red }]}>MISTOOK FOR {a.picked.name.toUpperCase()}</Text>
                </View>
                <Icon name="x" size={18} color={T.red} stroke={3} />
              </Row>
            ))}
          </Module>
        )}
        <View style={{ height: 92 }} />
      </Scroll>

      <View style={styles.footer}>
        <Row style={{ gap: 10 }}>
          <Touchable className="press" onPress={onHome} style={[styles.secondaryBtn, { flex: 1 }]}>
            <Icon name="grid" size={17} color={T.navy} stroke={2.2} /><Text style={styles.secondaryTxt}>Home</Text>
          </Touchable>
          <Touchable className="press" onPress={onAgain} style={[styles.primaryBtn, { flex: 1.6 }]}>
            <Icon name="refresh" size={18} color={T.onRed} stroke={2.4} /><Text style={styles.primaryTxt}>Play Again</Text>
          </Touchable>
        </Row>
      </View>
    </View>
  );
}

/* ---------- APP ------------------------------------------------------------ */
function App() {
  const [screen, setScreen] = useState("home");
  const [config, setConfig] = useState({ type: "flagToName", scope: "world", difficulty: "medium", mode: "classic", srs: false });
  const [result, setResult] = useState(null);
  const [isNewBest, setIsNewBest] = useState(false);
  const [bestScores, setBestScores] = useState({}); // -> AsyncStorage on Expo
  const [srsWeights, setSrsWeights] = useState({});
  const [runId, setRunId] = useState(0);

  const start = () => { setRunId((r) => r + 1); setScreen("quiz"); };
  const again = () => { setRunId((r) => r + 1); setScreen("quiz"); };

  const updateSrs = (code, multiplier) => {
    setSrsWeights((w) => {
      const current = w[code] || 1;
      const next = Math.max(0.1, Math.min(10, current * multiplier));
      return { ...w, [code]: next };
    });
  };

  const handleFinish = (r) => {
    const key = `${config.type}|${config.scope}|${config.difficulty}|${config.mode}`;
    const prev = bestScores[key];
    const newBest = (prev == null || r.score > prev) && r.total > 0;
    if (newBest) setBestScores((b) => ({ ...b, [key]: r.score }));
    setIsNewBest(newBest);
    setResult(r);
    setScreen("results");
  };

  return (
    <View style={styles.outer}>
      <View style={styles.app}>
        {screen === "home" && <Home config={config} setConfig={setConfig} onStart={start} bestScores={bestScores} />}
        {screen === "quiz" && <Quiz key={runId} config={config} onFinish={handleFinish} onQuit={() => setScreen("home")} srsWeights={srsWeights} onSrsUpdate={updateSrs} />}
        {screen === "results" && <Results result={result} isNewBest={isNewBest} config={config} onAgain={again} onHome={() => setScreen("home")} />}
      </View>
    </View>
  );
}
