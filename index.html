  <div style={{ display: "flex", flexDirection: "column", boxSizing: "border-box", ...flat(style) }} {...p}>{children}</div>
);
const Row = ({ style, children, ...p }) => (
  <View style={[{ flexDirection: "row" }, style]} {...p}>{children}</View>
);
const Text = ({ style, children, ...p }) => (
  <span style={{ boxSizing: "border-box", ...flat(style) }} {...p}>{children}</span>
);
const Touchable = ({ style, children, onPress, disabled, ...p }) => (
  <button
    disabled={disabled}
    onClick={onPress}
    style={{
      display: "flex", flexDirection: "column", boxSizing: "border-box",
      border: "none", background: "transparent", padding: 0, margin: 0,
      font: "inherit", textAlign: "left", color: "inherit",
      cursor: disabled ? "default" : "pointer", userSelect: "none",
      WebkitTapHighlightColor: "transparent", transition: "transform .12s ease",
      ...flat(style),
    }}
    {...p}
  >{children}</button>
);
const fallbackFromUri = (uri) => typeof uri === "string" && uri.endsWith(".svg") ? uri.replace(/\.svg$/, ".png") : null;
const Img = ({ uri, fallbackUri, style, onError, ...p }) => (
  <img
    key={uri}
    src={uri}
    alt=""
    draggable={false}
    onError={(event) => {
      const fallback = fallbackUri || fallbackFromUri(uri);
      if (fallback && event.currentTarget.dataset.fallback !== "1") {
        event.currentTarget.dataset.fallback = "1";
        event.currentTarget.src = fallback;
        return;
      }
      if (onError) onError(event);
    }}
    style={{ display: "block", ...flat(style) }}
    {...p}
  />
);
const Scroll = ({ style, contentStyle, children, innerRef }) => (
  <div ref={innerRef} className="scrollable" style={{ flex: 1, minHeight: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", ...flat(style) }}>

);

function weightedPick(pool, weights, recent) {
  let available = pool.filter((c) => !recent.includes(c.code));
  if (available.length === 0) available = pool;
  const items = available.map((c) => ({ item: c, w: weights[c.code] || 1 }));
  const total = items.reduce((s, i) => s + i.w, 0);
  let r = Math.random() * total;
  for (const i of items) { r -= i.w; if (r <= 0) return i.item; }
  return items[items.length - 1].item;
}

function getPool(config) {
  let base = regionalPool(config.scope);
  let pool = base;
  if (config.difficulty === "easy") pool = base.filter((c) => c.diff === 1);
  else if (config.difficulty === "medium") pool = base.filter((c) => c.diff <= 2);
  if (pool.length < 8) pool = base; // small-continent safety net
  return pool;
}

function getStudyPool(config) {
  if (scopeHas(config.scope, "similar")) return similarPool();

function getFlashcardPool(scope, missedCodes = []) {
  if (scopeHas(scope, "missed")) return countriesFromCodes(missedCodes);
  if (scopeHas(scope, "similar")) return similarPool();
  return regionalPool(scope);
}

const countriesFromCodes = (codes) => codes.map((code) => BY_CODE[code]).filter(Boolean);
const answerGroupCodesFor = (code) => Array.from(new Set(
  ANSWER_GROUPS.filter((group) => group.includes(code)).flat()
));

function addDistractors(opts, candidates, target, need) {
  const seen = new Set([target.code, ...opts.map((c) => c.code)]);
  const seenFlags = new Set([visualFlagKey(target.code), ...opts.map((c) => visualFlagKey(c.code))]);
  for (const c of shuffle(candidates)) {
    if (!c || seen.has(c.code)) continue;
    const flagKey = visualFlagKey(c.code);
    if (seenFlags.has(flagKey)) continue;
    opts.push(c);
    seen.add(c.code);
    seenFlags.add(flagKey);
    if (opts.length >= need) break;
  }
  return opts;
}

function buildDistractors(config, target, preferredCodes = []) {
  const need = NUM_OPTIONS[config.difficulty] - 1;
  const targetPool = scopeHas(config.scope, "similar") ? getStudyPool(config) : getPool(config);
  const poolCodes = new Set(targetPool.map((c) => c.code));
  const inPool = (items) => items.filter((c) => poolCodes.has(c.code));
  const sameContinent = targetPool.filter((c) => c.continent === target.continent);
  const groupCountries = countriesFromCodes([...preferredCodes, ...answerGroupCodesFor(target.code)]);
  const hardFloor = config.difficulty === "hard" ? Math.max(2, target.diff) : target.diff;
  const opts = [];

  const tiers = config.type === "nameToFlag"
    ? (config.difficulty === "hard"
      ? [
          groupCountries.filter((c) => c.diff >= hardFloor || c.continent === target.continent),
          groupCountries,
          sameContinent.filter((c) => c.diff >= hardFloor),
          targetPool.filter((c) => c.diff >= hardFloor),
          targetPool.filter((c) => c.diff === target.diff),
          COUNTRIES.filter((c) => c.diff >= hardFloor),
          sameContinent,
          targetPool,
        ]
      : [
          groupCountries,
          sameContinent.filter((c) => c.diff === target.diff),
          targetPool.filter((c) => c.diff === target.diff),
          COUNTRIES.filter((c) => c.diff === target.diff),
          sameContinent,
          targetPool,
        ])
    : config.difficulty === "hard"
    ? [
        inPool(groupCountries).filter((c) => c.diff >= hardFloor || c.continent === target.continent),
        sameContinent.filter((c) => c.diff >= hardFloor),
        targetPool.filter((c) => c.diff === target.diff),
        targetPool.filter((c) => c.diff >= hardFloor),
        inPool(groupCountries),
        sameContinent,
        targetPool,
        groupCountries,
      ]
    : [
        inPool(groupCountries),
        sameContinent.filter((c) => c.diff === target.diff),
        targetPool.filter((c) => c.diff === target.diff),
        sameContinent,
        targetPool,
        groupCountries,
      ];

  tiers.forEach((tier) => addDistractors(opts, tier, target, need));
  if (opts.length < need) addDistractors(opts, COUNTRIES, target, need);
  return opts.slice(0, need);
}

function makeQuestion(config, recent, weights = {}) {
  const n = NUM_OPTIONS[config.difficulty];
  if (scopeHas(config.scope, "similar")) {
    const group = pick(SIMILAR_GROUPS).map((c) => BY_CODE[c]).filter(Boolean);
    const target = weightedPick(group, weights, recent);
    const opts = buildDistractors(config, target, group.map((c) => c.code));
    return { target, options: shuffle([target, ...opts]), type: config.type };
  }
  const pool = getPool(config);
  const target = weightedPick(pool, weights, recent);
  const distractors = buildDistractors(config, target);
  return { target, options: shuffle([target, ...distractors]), type: config.type };
}

function getQuizTargetPool(config) {
  if (config.mode === "survival") return getFlashcardPool(config.scope);
  return scopeHas(config.scope, "similar") ? getStudyPool(config) : getPool(config);
}

function makeQuestionForTarget(config, target) {
  const n = NUM_OPTIONS[config.difficulty];
  if (scopeHas(config.scope, "similar")) {
    const group = (SIMILAR_GROUPS.find((codes) => codes.includes(target.code)) || [])
      .map((code) => BY_CODE[code])
      .filter(Boolean);
    const opts = buildDistractors(config, target, group.map((c) => c.code));
    return { target, options: shuffle([target, ...opts]), type: config.type };
  }
  const distractors = buildDistractors(config, target);
  return { target, options: shuffle([target, ...distractors]), type: config.type };
}

function makeUniqueQuestion(config, usedCodes) {
  const pool = getQuizTargetPool(config);
  const available = pool.filter((c) => !usedCodes.includes(c.code));
  if (!available.length) return null;
  return makeQuestionForTarget(config, pick(available));
}

function makeBattleQuestions(config, count) {
  const usedCodes = [];
  const questions = [];
  for (let i = 0; i < count; i++) {
    const q = makeUniqueQuestion({ ...config, mode: "classic" }, usedCodes);
    if (!q) break;
    usedCodes.push(q.target.code);
    questions.push(q);
  }
  return questions;
}

const packBattleQuestion = (question) => ({
  t: question?.target?.code || question?.target,
  o: (question?.options || []).map((country) => country?.code || country).filter(Boolean),
  y: question?.type || "flagToName",
});
const unpackBattleQuestion = (question) => {
  if (!question) return null;
  if (question.target?.code && Array.isArray(question.options)) return question;
  const target = BY_CODE[question.t || question.target];
  const options = (question.o || question.options || [])
    .map((country) => BY_CODE[country?.code || country])
    .filter(Boolean);
  return target && options.length ? { target, options, type: question.y || question.type || "flagToName" } : null;
};
const packBattleState = (state) => state ? ({
  ...state,
  questions: (state.questions || []).map(packBattleQuestion),
}) : state;
const unpackBattleState = (state) => state ? ({
  ...state,
  questions: (state.questions || []).map(unpackBattleQuestion).filter(Boolean),
}) : state;
const fmtTime = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
const accuracy = (r) => (r.total ? Math.round((r.score / r.total) * 100) : 0);
const weekAgo = () => Date.now() - 7 * 24 * 60 * 60 * 1000;
const avg = (nums) => nums.length ? nums.reduce((sum, n) => sum + n, 0) / nums.length : 0;
const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
const preloadFlag = (country, w = 640) => new Promise((resolve) => {
  const img = new Image();
  let triedFallback = false;
  img.onload = resolve;
  img.onerror = () => {
    if (!triedFallback) {
      triedFallback = true;
      flagFallbackCodes.add(country.code);
      img.src = flagFallbackUrl(country.code);
      return;
    }
    resolve();
  };
  img.src = flagFallbackCodes.has(country.code) ? flagFallbackUrl(country.code) : flagSvgUrl(country.code);
});
const preloadQuestionAssets = (question) => {
  if (!question) return Promise.resolve();
  const flags = question.type === "flagToName" ? [question.target] : question.options;
  return Promise.all(flags.map((country) => preloadFlag(country, question.type === "flagToName" ? 640 : 320)));
};
const calcAccuracy = (runs) => {
  const totals = runs.reduce((acc, run) => ({
    score: acc.score + (run.score || 0),
    total: acc.total + (run.total || 0),
  }), { score: 0, total: 0 });
  return totals.total ? Math.round((totals.score / totals.total) * 100) : 0;
};

function AuthPanel({ session, authReady, onGuest, showGuest = false }) {
  const [mode, setMode] = useState("signIn");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [signupUsername, setSignupUsername] = useState("");
  const [username, setUsername] = useState("");
  const [usernameBusy, setUsernameBusy] = useState(false);
  const [busy, setBusy] = useState(false);
  const [notice, setNotice] = useState(authCallbackError().replace(/\+/g, " "));
  const user = session && session.user;
  const emailReady = email.trim().length > 0 && password.length >= 6;

  useEffect(() => {
    if (user) {
      setPassword("");
      setNotice("");
    }
  }, [user && user.id]);

  useEffect(() => {
    const current = user && user.user_metadata && user.user_metadata.username;
    if (current) { setUsername(current); return; }
    setUsername("");
    if (!user || !supabaseClient) return;
    // Existing accounts (or Google sign-ins) may not have a username yet — assign one silently.
    let cancelled = false;
    supabaseClient.auth.updateUser({ data: { username: randomGuestName() } }).then(({ data, error }) => {
      if (!cancelled && !error && data.user) setUsername(data.user.user_metadata.username);
    });
    return () => { cancelled = true; };
  }, [user && user.id, user && user.user_metadata && user.user_metadata.username]);

  const handleEmailAuth = async () => {
    if (!supabaseClient || busy) return;
    if (!emailReady) {
      setNotice("Enter an email and a password with at least 6 characters.");
      return;
    }
    setBusy(true);
    setNotice("");
    const credentials = { email: email.trim(), password };
    const { data, error } = mode === "signUp"
      ? await supabaseClient.auth.signUp({
          ...credentials,
          options: {
            emailRedirectTo: authRedirectTo(),
            data: { username: signupUsername.trim() || randomGuestName() },
          },
        })
      : await supabaseClient.auth.signInWithPassword(credentials);
    setBusy(false);
    if (error) {
      setNotice(error.message);
      return;
    }
    setNotice(mode === "signUp" && !data.session
      ? "Check your email to confirm your account."
      : "Signed in.");
  };

  const handleSaveUsername = async () => {
    if (!supabaseClient || usernameBusy) return;
    const trimmed = username.trim();
    if (!trimmed) {
      setNotice("Username can't be empty.");
      return;
    }
    setUsernameBusy(true);
    setNotice("");
    const { error } = await supabaseClient.auth.updateUser({ data: { username: trimmed } });
    setUsernameBusy(false);
    setNotice(error ? error.message : "Username updated.");
  };

  const handleGoogleAuth = async () => {
    if (!supabaseClient || busy) return;
    setBusy(true);
    setNotice("");
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: authRedirectTo() },
    });
    if (error) {
      setNotice(error.message);
      setBusy(false);
    }
  };

  const handleSignOut = async () => {
    if (!supabaseClient || busy) return;
    setBusy(true);
    const { error } = await supabaseClient.auth.signOut();
    setBusy(false);
    setNotice(error ? error.message : "Signed out.");
  };

  if (!supabaseClient) {
    return (
      <Module label="ACCOUNT" tone="teal">
        <Row style={{ alignItems: "center", gap: 12 }}>
          <View style={styles.authAvatar}><Icon name="user" size={20} color={T.onNavy} stroke={2.2} /></View>
          <View style={{ flex: 1, gap: 2 }}>
            <Text style={styles.optTitle}>Auth setup pending</Text>
            <Text style={styles.optDesc}>{hasSupabaseConfig ? "Supabase SDK did not load." : "Add your Supabase URL and publishable key."}</Text>
          </View>
        </Row>
      </Module>
    );
  }

  if (!authReady) {
    return (
      <Module label="ACCOUNT" tone="teal">
        <Text style={styles.authNotice}>Checking session...</Text>
      </Module>
    );
  }

  if (user) {
    const savedUsername = (user.user_metadata && user.user_metadata.username) || "";
    const usernameChanged = username.trim().length > 0 && username.trim() !== savedUsername;
    return (
      <Module label="ACCOUNT" tone="teal" right={<Text style={styles.authPill}>SIGNED IN</Text>}>
        <Row style={{ alignItems: "center", gap: 12 }}>
          <View style={styles.authAvatar}><Icon name="user" size={20} color={T.onNavy} stroke={2.2} /></View>
          <View style={{ flex: 1, gap: 2, minWidth: 0 }}>
            <Text style={styles.authEmail}>{savedUsername || "Signed in"}</Text>
            <Text style={styles.optDesc}>Scores save under this account on this device</Text>
          </View>
        </Row>
        <input
          aria-label="Username"
          placeholder="Username"
          value={username}
          maxLength={20}
          onChange={(e) => setUsername(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") handleSaveUsername(); }}
          style={styles.authInput}
        />
        <Touchable type="button" className="press" onPress={handleSaveUsername} disabled={usernameBusy || !usernameChanged} style={[styles.secondaryBtn, (usernameBusy || !usernameChanged) && styles.disabledBtn]}>
          <Icon name="check" size={17} color={T.navy} stroke={2.4} />
          <Text style={styles.secondaryTxt}>{usernameBusy ? "Saving..." : "Save Username"}</Text>
        </Touchable>
        <Touchable type="button" className="press" onPress={handleSignOut} disabled={busy} style={[styles.secondaryBtn, busy && styles.disabledBtn]}>
          <Icon name="logOut" size={17} color={T.navy} stroke={2.4} />
          <Text style={styles.secondaryTxt}>{busy ? "Working..." : "Sign Out"}</Text>
        </Touchable>
        {notice && <Text style={styles.authNotice}>{notice}</Text>}
      </Module>
    );
  }

  return (
    <Module label="ACCOUNT" tone="teal">
      <Row style={styles.segWrap}>
        <Touchable type="button" onPress={() => setMode("signIn")} style={[styles.seg, mode === "signIn" && styles.segOn]}>
          <Text style={[styles.segLabel, mode === "signIn" && styles.segLabelOn]}>Sign In</Text>
        </Touchable>
        <Touchable type="button" onPress={() => setMode("signUp")} style={[styles.seg, mode === "signUp" && styles.segOn]}>
          <Text style={[styles.segLabel, mode === "signUp" && styles.segLabelOn]}>Sign Up</Text>
        </Touchable>
      </Row>

      <Touchable type="button" className="press" onPress={handleGoogleAuth} disabled={busy} style={[styles.authGoogleBtn, busy && styles.disabledBtn]}>
        <Icon name="google" size={22} />
        <Text style={styles.secondaryTxt}>Continue with Google</Text>
      </Touchable>

      <View style={styles.authDivider}>
        <View style={styles.authDividerLine} />
        <Text style={styles.authDividerTxt}>OR</Text>
        <View style={styles.authDividerLine} />
      </View>

      {mode === "signUp" && (
        <input
          aria-label="Username"
          placeholder="Username (optional)"
          value={signupUsername}
          maxLength={20}
          onChange={(e) => setSignupUsername(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") handleEmailAuth(); }}
          style={styles.authInput}
        />
      )}
      <input
        aria-label="Email"
        autoComplete="email"
        inputMode="email"
        placeholder="email@example.com"
        value={email}
        onChange={(e) => setEmail(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") handleEmailAuth(); }}
        style={styles.authInput}
      />
      <input
        aria-label="Password"
        autoComplete={mode === "signUp" ? "new-password" : "current-password"}
        placeholder="password"
        type="password"
        value={password}
        onChange={(e) => setPassword(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") handleEmailAuth(); }}
        style={styles.authInput}
      />
      <Touchable type="button" className="press" onPress={handleEmailAuth} disabled={busy || !emailReady} style={[styles.primaryBtn, (busy || !emailReady) && styles.disabledBtn]}>
        <Icon name={mode === "signUp" ? "user" : "arrowRight"} size={17} color={T.onRed} stroke={2.4} />
        <Text style={styles.primaryTxt}>{busy ? "Working..." : mode === "signUp" ? "Create Account" : "Sign In"}</Text>
      </Touchable>
      {showGuest && (
        <Touchable type="button" className="press" onPress={onGuest} disabled={busy} style={styles.secondaryBtn}>
          <Icon name="flag" size={17} color={T.navy} stroke={2.4} />
          <Text style={styles.secondaryTxt}>Play as Guest</Text>
        </Touchable>
      )}
      {notice && <Text style={styles.authNotice}>{notice}</Text>}
    </Module>
  );
}

    missed: countriesFromCodes(missedCodes).length,
  }), [missedCodes]);
  const makeCard = (weights = srsWeights) => {
    const pool = getFlashcardPool(learnConfig.scope, missedCodes);
    if (pool.length === 0) return null;
    const next = weightedPick(pool, weights, recent.current);
    recent.current = [next.code, ...recent.current].slice(0, 12);
    return next;
  };
  const [card, setCard] = useState(null);
  const [answerCard, setAnswerCard] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [answerReady, setAnswerReady] = useState(false);
  const [transitioning, setTransitioning] = useState(false);
  const [reviewed, setReviewed] = useState(0);
  const poolCount = getFlashcardPool(learnConfig.scope, missedCodes).length;
  const learnScopeId = scopeId(learnConfig.scope);

  const queueNextCard = (weights = srsWeights) => {
    const next = makeCard(weights);
    queuedCard.current = next;
    queuedReady.current = next ? preloadFlag(next) : Promise.resolve();
    return next;
  };

  useEffect(() => {
    recent.current = [];
    queuedCard.current = null;
    queuedReady.current = Promise.resolve();
    setCard(null);
    setAnswerCard(null);
    setRevealed(false);
    setAnswerReady(false);
    setTransitioning(false);
    setReviewed(0);
    setScreen("setup");
  }, [learnScopeId]);

  const setScope = (scope) => setLearnConfig((c) => ({ ...c, scope: toggleScope(c.scope, scope, { allowMissed: true }) }));

  const start = () => {
    recent.current = [];
    queuedCard.current = null;
    queuedReady.current = Promise.resolve();
    setReviewed(0);
    setTransitioning(false);
    setRevealed(false);
    setAnswerReady(false);
    const firstCard = makeCard();
    if (!firstCard) return;
    setCard(firstCard);
    setAnswerCard(firstCard);
    queueNextCard();
    setScreen("study");
  };

  const reveal = () => {
    if (transitioning) return;
    setAnswerCard(card);
    setRevealed(true);
    setAnswerReady(false);
    if (!queuedCard.current) queueNextCard();
    setTimeout(() => setAnswerReady(true), 180);
  };

  const flipCard = () => {
    if (transitioning) return;
    if (revealed) {
      setRevealed(false);
      setAnswerReady(false);
    } else {
      reveal();
    }
  };

  const review = (rating) => {
    if (!card || transitioning) return;
    const multipliers = { tricky: 1.8, good: 0.7, easy: 0.35 };
    const current = srsWeights[card.code] || 1;
    const nextWeight = Math.max(0.1, Math.min(10, current * multipliers[rating]));
    const nextWeights = { ...srsWeights, [card.code]: nextWeight };
    const nextCard = queuedCard.current || makeCard(nextWeights);
    const nextReady = queuedCard.current ? queuedReady.current : (nextCard ? preloadFlag(nextCard) : Promise.resolve());
    queuedCard.current = null;
    queuedReady.current = Promise.resolve();
    onReview(card, rating, learnConfig);
    setReviewed((n) => n + 1);
    setTransitioning(true);
    setAnswerReady(false);
    setRevealed(false);
    const displayCard = nextCard || makeCard(nextWeights);
    nextReady.then(() => {});
    setCard(displayCard);
    setRevealed(false);
    wait(180).then(() => {
      setAnswerCard(displayCard);
      setTransitioning(false);
      queueNextCard(nextWeights);
    });
  };

  if (screen === "study" && card) {
    return (
      <View style={{ flex: 1, minHeight: 0 }}>
        <Row style={styles.qTop}>
          <Touchable className="press" onPress={() => setScreen("setup")} style={styles.iconBtn}><Icon name="x" size={18} color={T.navy} stroke={2.6} /></Touchable>
          <View style={{ flex: 1, alignItems: "center" }}>
            <Text style={styles.statusTxt}>CARD {String(reviewed + 1).padStart(2, "0")}</Text>
          </View>
          <View style={styles.scoreChip}><Text style={styles.scoreTxt}>{reviewed}</Text></View>
        </Row>

        <Scroll contentStyle={{ padding: 20, paddingTop: 22, gap: 18, alignItems: "center" }}>
          <Module label="FLASHCARD" tone="navy" style={{ width: "100%" }}>
            <Touchable className="press" onPress={flipCard} disabled={transitioning} style={styles.flashStageTap}>
              <View style={styles.flashStage}>
                <View style={[styles.flashInner, revealed && styles.flashInnerOn]}>
                  <View style={styles.flashFace}>
                    <View style={styles.flipHint}><Icon name="turnArrow" size={18} color={T.navy} stroke={2.4} /></View>
                    <Text style={styles.prompt}>NAME THIS FLAG</Text>
                    <View style={styles.flashFlagFrame}><Img uri={flagUrl(card.code, 640)} style={[styles.heroFlag, flagEdgeStyle(card.code)]} /></View>
                  </View>
                  <View style={[styles.flashFace, styles.flashBack]}>
                    <View style={styles.flipHint}><Icon name="turnArrow" size={18} color={T.navy} stroke={2.4} /></View>
                    <Text style={styles.prompt}>ANSWER</Text>
                    <Text style={styles.flashName}>{(answerCard || card).name}</Text>
                    <Text style={styles.flashMeta}>{(answerCard || card).continent.toUpperCase()}</Text>
                  </View>
                </View>
              </View>
            </Touchable>

            <View style={styles.flashActionSlot}>
              {!revealed ? (
                <Touchable className="press" onPress={reveal} disabled={transitioning} style={[styles.primaryBtn, styles.flashRevealBtn, transitioning && styles.disabledBtn]}>
                  <Icon name="arrowRight" size={17} color={T.onRed} stroke={2.4} />
                  <Text style={styles.primaryTxt}>Reveal</Text>
                </Touchable>
              ) : answerReady && !transitioning ? (
                <View style={styles.confWrap} className="popIn">
                  <Text style={styles.confLabel}>CONFIDENCE</Text>
                  <Row style={styles.confRow}>
                    <Touchable className="press" onPress={() => review("tricky")} disabled={transitioning} style={[styles.confBtn, { background: T.redSoft }, transitioning && styles.disabledBtn]}>
                      <Text style={styles.confTxt}>TRICKY</Text><Text style={styles.confSub}>soon</Text>
                    </Touchable>
                    <Touchable className="press" onPress={() => review("good")} disabled={transitioning} style={[styles.confBtn, { background: T.blueFixed }, transitioning && styles.disabledBtn]}>
                      <Text style={styles.confTxt}>GOOD</Text><Text style={styles.confSub}>later</Text>
                    </Touchable>
                    <Touchable className="press" onPress={() => review("easy")} disabled={transitioning} style={[styles.confBtn, { background: T.tealFixed }, transitioning && styles.disabledBtn]}>
                      <Text style={styles.confTxt}>EASY</Text><Text style={styles.confSub}>rarely</Text>
                    </Touchable>
                  </Row>
                </View>
              ) : (
                <View style={styles.confPlaceholder} />
              )}
            </View>
          </Module>
          <View style={{ height: 20 }} />
        </Scroll>
      </View>
    );
  }

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <AppHeader kicker="LEARN" title="FLASHCARDS" />
      <Scroll contentStyle={{ padding: 18, paddingTop: 16, gap: 16 }}>
        <Module label="REGION">
          <RegionGrid value={learnConfig.scope} onChange={setScope} scopes={learnScopes} counts={learnCounts} />
          <Text style={styles.hint}>{scopeHas(learnConfig.scope, "missed")
            ? (poolCount > 0 ? `${poolCount} MISSED FLAGS READY` : "MISSED FLAGS WILL APPEAR HERE AFTER QUIZZES")
            : `${poolCount} CARDS`}</Text>
        </Module>

        <View style={styles.setupCtaWrap}>
          <Touchable className="press" onPress={start} disabled={poolCount === 0} style={[styles.primaryBtn, styles.setupCtaBtn, poolCount === 0 && styles.disabledBtn]}>
            <Icon name="starFilled" size={15} color={T.onRed} />
            <Text style={styles.primaryTxt}>Start Learning</Text>
          </Touchable>
        </View>
        <View style={{ height: 18 }} />
      </Scroll>
      </View>
  );
}

            <View style={[styles.statBox, { flex: 1 }]}>

            <View style={[styles.statBox, { flex: 1 }]}>

/* ---------- QUIZ ----------------------------------------------------------- */
function Quiz({ config, onFinish, onQuit }) {
  const usedCodes = useRef([]);
  const [question, setQuestion] = useState(() => {
    const q = makeUniqueQuestion(config, []);
    if (q) usedCodes.current = [q.target.code];
    return q;
  });
  const [score, setScore] = useState(0);
  const [lives, setLives] = useState(3);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [pendingAdvance, setPendingAdvance] = useState(null);
  const [questionReady, setQuestionReady] = useState(false);
  const [timeLeft, setTimeLeft] = useState(60);
  const [tick, setTick] = useState(0);

  const answersRef = useRef([]); const scoreRef = useRef(0); const done = useRef(false); const quizScrollRef = useRef(null);
  const answerLocked = useRef(false); const advanceLocked = useRef(false);
  useEffect(() => { answersRef.current = answers; }, [answers]);
  useEffect(() => { scoreRef.current = score; }, [score]);
  useEffect(() => {
    if (!pendingAdvance || !quizScrollRef.current) return;
    requestAnimationFrame(() => {
      quizScrollRef.current?.scrollTo({ top: quizScrollRef.current.scrollHeight, behavior: "smooth" });
    });
  }, [pendingAdvance]);
  useEffect(() => {
    let cancelled = false;
    setQuestionReady(false);
    preloadQuestionAssets(question).then(() => {
      if (!cancelled && !done.current) setQuestionReady(true);
    });
    return () => { cancelled = true; };
  }, [question]);

  const finish = () => {
    if (done.current) return;
    done.current = true;
    onFinish({
      score: scoreRef.current,
      total: answersRef.current.length,
      answers: answersRef.current,
      timeLeft: config.mode === "timeAttack" ? timeLeft : undefined,
    });
  };

  useEffect(() => {
    if (config.mode !== "timeAttack" || done.current) return;
    if (timeLeft <= 0) { finish(); return; }
    if (!questionReady) return;
    const t = setTimeout(() => setTimeLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, config.mode, questionReady]);

  const advanceAfterAnswer = (advance) => {
    if (!advance || done.current || advanceLocked.current) return;
    advanceLocked.current = true;
    setPendingAdvance(null);
    const { newAnswers, newScore, newLives, nextQuestion, nextReady } = advance;
    answersRef.current = newAnswers; scoreRef.current = newScore;
    if (config.mode === "classic" && newAnswers.length >= CLASSIC_TOTAL) return finish();
    if (config.mode === "survival" && newLives <= 0) return finish();
    if (config.mode === "timeAttack" && timeLeft <= 0) return finish();
    if (usedCodes.current.length >= getQuizTargetPool(config).length) return finish();
    if (!nextQuestion) return finish();
    const maxPreloadWait = config.mode === "timeAttack" ? 20 : 70;
    Promise.race([nextReady, wait(maxPreloadWait)]).then(() => {
      if (done.current) return;
      usedCodes.current = [nextQuestion.target.code, ...usedCodes.current];
      setQuestionReady(false);
      setQuestion(nextQuestion);
      setSelected(null);
      setTick((t) => t + 1);
      answerLocked.current = false;
      advanceLocked.current = false;
    });
  };

  const answer = (country) => {
    if (answerLocked.current || !questionReady || selected || done.current || !question) return;
    answerLocked.current = true;
    const correct = country.code === question.target.code;
    setSelected(country);
    const newAnswers = [...answers, { target: question.target, picked: country, correct }];
    setAnswers(newAnswers);
    const newScore = score + (correct ? 1 : 0);
    if (correct) setScore(newScore);
    const newLives = !correct && config.mode === "survival" ? lives - 1 : lives;
    if (newLives !== lives) setLives(newLives);
    const shouldContinue = !(
      (config.mode === "classic" && newAnswers.length >= CLASSIC_TOTAL) ||
      (config.mode === "survival" && newLives <= 0) ||
      (config.mode === "timeAttack" && timeLeft <= 0) ||
      usedCodes.current.length >= getQuizTargetPool(config).length
    );
    const nextQuestion = shouldContinue ? makeUniqueQuestion(config, usedCodes.current) : null;
    const advance = { newAnswers, newScore, newLives, nextQuestion, nextReady: preloadQuestionAssets(nextQuestion) };
    const pauseForReview = !correct && (config.mode === "classic" || config.mode === "survival");

    if (pauseForReview) {
      setPendingAdvance(advance);
      return;
    }

    const advanceDelay = config.mode === "timeAttack" ? 45 : 420;
    setTimeout(() => advanceAfterAnswer(advance), advanceDelay);
  };

  const optColor = (c) => {
    if (!selected) return null;
    if (c.code === question.target.code) return "correct";
    if (c.code === selected.code) return "wrong";
    return null;
  };
  const hardMode = config.difficulty === "hard";
  const classicQuestionNumber = Math.min(CLASSIC_TOTAL, Math.max(1, usedCodes.current.length));
  const isQuestionLoading = !question || !questionReady;
  const isSpotFlagQuestion = question?.type === "nameToFlag";
  const quizSidePadding = isSpotFlagQuestion ? 14 : hardMode ? 16 : 20;

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <Row style={[styles.qTop, hardMode && styles.qTopCompact]}>
        <Touchable className="press" onPress={onQuit} style={[styles.iconBtn, hardMode && styles.iconBtnCompact]}><Icon name="x" size={hardMode ? 16 : 18} color={T.navy} stroke={2.6} /></Touchable>
        <View style={{ flex: 1, alignItems: "center" }}>
          {config.mode === "timeAttack" && (
            <Row style={{ alignItems: "center", gap: 7 }}>
              <Icon name="stopwatch" size={hardMode ? 15 : 17} color={timeLeft <= 10 ? T.red : T.navy} stroke={2.1} />
              <Text style={[styles.statusTxt, hardMode && styles.statusTxtCompact, timeLeft <= 10 && { color: T.red }]}>{fmtTime(timeLeft)}</Text>
            </Row>
          )}
          {config.mode === "survival" && (
            <Row style={{ gap: 6 }}>
              {[0, 1, 2].map((i) => (
                <Icon key={i} name={i < lives ? "heartFilled" : "heart"} size={hardMode ? 17 : 19} color={i < lives ? T.red : T.outlineVar} stroke={2} />
              ))}
            </Row>
          )}
        </View>
        <View style={[styles.scoreChip, hardMode && styles.scoreChipCompact]}><Text style={[styles.scoreTxt, hardMode && styles.scoreTxtCompact]}>{score}</Text></View>
      </Row>

      {config.mode === "classic" && (
        <Row style={[styles.progressTrack, hardMode && styles.progressTrackCompact]}>
          {Array.from({ length: CLASSIC_TOTAL }).map((_, i) => (
            <View key={i} style={[styles.progressSeg, hardMode && styles.progressSegCompact, i < classicQuestionNumber && styles.progressSegOn]} />
          ))}
        </Row>
      )}
      {config.mode === "timeAttack" && (
        <View style={[styles.barTrack, hardMode && styles.barTrackCompact]}><View style={[styles.barFill, { width: `${(timeLeft / 60) * 100}%`, background: timeLeft <= 10 ? T.red : T.navy }]} /></View>
      )}

      <Scroll innerRef={quizScrollRef} contentStyle={{ padding: quizSidePadding, paddingTop: hardMode ? 12 : 22, gap: hardMode ? 14 : 20, alignItems: "center" }}>
        {isQuestionLoading ? (
          <View style={[styles.quizLoading, hardMode && styles.quizLoadingCompact]}>
            <View className="spin" style={styles.loadingSpinner} />
            <Text style={styles.loadingTxt}>LOADING FLAG</Text>
          </View>
        ) : (
        <div key={tick} className="softFade" style={{ width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: hardMode ? 14 : 20 }}>
          {question.type === "flagToName" ? (
            <React.Fragment>
              <Text style={[styles.prompt, hardMode && styles.promptCompact]}>IDENTIFY THE FLAG</Text>
              <View style={[styles.flagSlot, hardMode && styles.flagSlotCompact]}>
                <View style={[styles.flagFrame, hardMode && styles.flagFrameCompact]}>
                  <Img uri={flagUrl(question.target.code, 640)} style={[styles.quizFlagImg, hardMode && styles.quizFlagImgCompact, flagEdgeStyle(question.target.code)]} />
                </View>
              </View>
              <View style={{ width: "100%", gap: hardMode ? 9 : 10, marginTop: hardMode ? 4 : 2 }}>
                {question.options.map((c, idx) => {
                  const st = optColor(c);
                  return (
                    <Touchable key={c.code} className="press" disabled={!!selected} onPress={() => answer(c)}
                      style={[styles.answer, hardMode && styles.answerCompact, st === "correct" && styles.answerCorrect, st === "wrong" && styles.answerWrong]}>
                      <Row style={{ alignItems: "center", gap: hardMode ? 10 : 12 }}>
                        <View style={[styles.letter, hardMode && styles.letterCompact, st && styles.letterOn]}>
                          <Text style={[styles.letterTxt, hardMode && styles.letterTxtCompact, st && { color: st === "correct" ? T.teal : T.red }]}>{String.fromCharCode(65 + idx)}</Text>
                        </View>
                        <Text style={[styles.answerTxt, hardMode && styles.answerTxtCompact, st && { color: "#fff" }]}>{c.name}</Text>
                        <View style={{ flex: 1 }} />
                        {st === "correct" && <Icon name="check" size={hardMode ? 17 : 20} color="#fff" stroke={3} />}
                        {st === "wrong" && <Icon name="x" size={hardMode ? 16 : 19} color="#fff" stroke={3} />}
                      </Row>
                    </Touchable>
                  );
                })}
              </View>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <Text style={[styles.prompt, hardMode && styles.promptCompact]}>PICK THE FLAG OF</Text>
              <Text style={[styles.heroName, hardMode && styles.heroNameCompact]}>{question.target.name}</Text>
              <Row style={{ flexWrap: "wrap", gap: hardMode ? 10 : 12, justifyContent: "center", alignItems: "flex-start", marginTop: hardMode ? 3 : 2, width: "100%" }}>
                {question.options.map((c) => {
                  const st = optColor(c);
                  return (
                    <Touchable key={c.code} className="press" disabled={!!selected} onPress={() => answer(c)}
                      style={[styles.tile, hardMode && styles.tileCompact, st === "correct" && styles.tileCorrect, st === "wrong" && styles.tileWrong]}>
                      <Img uri={flagUrl(c.code, 320)} style={[styles.tileImg, flagEdgeStyle(c.code)]} />
                      {st && (
                        <View style={[styles.tileBadge, hardMode && styles.tileBadgeCompact, { background: st === "correct" ? T.teal : T.red }]}>
                          <Icon name={st === "correct" ? "check" : "x"} size={hardMode ? 12 : 14} color="#fff" stroke={3} />
                        </View>
                      )}
                    </Touchable>
                  );
                })}
              </Row>
            </React.Fragment>
          )}

          {selected && selected.code === question.target.code && (
            <View style={[styles.feedbackBox, hardMode && styles.feedbackBoxCompact, { background: T.teal }]}>
              <Text style={[styles.feedbackTxt, hardMode && styles.feedbackTxtCompact]}>CORRECT</Text>
            </View>
          )}
        </div>
        )}
        {pendingAdvance && (
          <View style={[styles.quizContinueInline, hardMode && styles.quizContinueInlineCompact]}>
            <Touchable className="press" onPress={() => advanceAfterAnswer(pendingAdvance)} style={styles.continueBtn}>
              <Text style={styles.continueTxt}>Continue</Text>
            </Touchable>
          </View>
        )}
        <View style={{ height: hardMode ? 8 : 24 }} />
      </Scroll>
    </View>
  );
}

/* ---------- RESULTS -------------------------------------------------------- */
function Results({ result, isNewBest, config, onAgain, onHome }) {
  const acc = accuracy(result);
  const grade = acc >= 90 ? "EXCELLENT" : acc >= 70 ? "GOOD" : acc >= 50 ? "OK" : "KEEP PRACTICING";
  const dirLabel = DIRECTIONS.find((d) => d.key === config.type)?.label;
  const modeLabel = STYLES_MODE.find((m) => m.key === config.mode)?.label;
  const scopeName = scopeLabel(config.scope);
  const missed = result.answers.filter((a) => !a.correct);
