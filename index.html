function BattleRace({ questions, players, startedAt, onProgress, onFinish, onQuit }) {
  const total = questions.length;
  const [index, setIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [questionReady, setQuestionReady] = useState(false);
  const [tick, setTick] = useState(0);
  const answersRef = useRef([]);
  const startedAtRef = useRef(startedAt || Date.now());
  const answerLocked = useRef(false);
  const done = useRef(false);
  const question = questions[index];

  useEffect(() => {
    let cancelled = false;
    setQuestionReady(false);
    preloadQuestionAssets(question).then(() => { if (!cancelled) setQuestionReady(true); });
    if (questions[index + 1]) preloadQuestionAssets(questions[index + 1]);
    return () => { cancelled = true; };
  }, [index]);

  const answer = (country) => {
    if (answerLocked.current || !questionReady || selected || done.current) return;
    answerLocked.current = true;
    const correct = country.code === question.target.code;
    setSelected(country);
    const newScore = score + (correct ? 1 : 0);
    if (correct) setScore(newScore);
    answersRef.current = [...answersRef.current, { target: question.target, picked: country, correct }];
    const nextIndex = index + 1;
    onProgress(nextIndex, newScore);
    setTimeout(() => {
      if (done.current) return;
      if (nextIndex >= total) {
        done.current = true;
        onFinish({ score: newScore, total, answers: answersRef.current, elapsedMs: Date.now() - startedAtRef.current });
        return;
      }
      setIndex(nextIndex);
      setSelected(null);
      setTick((t) => t + 1);
      answerLocked.current = false;
    }, 480);
  };

  const optColor = (c) => {
    if (!selected) return null;
    if (c.code === question.target.code) return "correct";
    if (c.code === selected.code) return "wrong";
    return null;
  };

  const isSpotFlagQuestion = question?.type === "nameToFlag";
  const opponents = (players || []).filter((p) => !p.__isMe);

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <Row style={styles.qTop}>
        <Touchable className="press" onPress={onQuit} style={styles.iconBtn}><Icon name="x" size={18} color={T.navy} stroke={2.6} /></Touchable>
        <View style={{ flex: 1, alignItems: "center" }}>
          <Text style={styles.statusTxt}>{Math.min(index + 1, total)} / {total}</Text>
        </View>
        <View style={styles.scoreChip}><Text style={styles.scoreTxt}>{score}</Text></View>
      </Row>

      <Row style={styles.progressTrack}>
        {Array.from({ length: total }).map((_, i) => (
          <View key={i} style={[styles.progressSeg, i < index && styles.progressSegOn]} />
        ))}
      </Row>

      {opponents.length > 0 && (
        <Row style={styles.battleLeaderStrip}>
          {opponents.map((p, i) => (
            <View key={p.id || i} style={styles.battleLeaderChip}>
              <Text style={styles.battleLeaderName}>{(p.name || "?").slice(0, 8)}</Text>
              <View style={styles.battleLeaderBar}>
                <View style={[styles.battleLeaderBarFill, { width: `${Math.min(100, ((p.index || 0) / total) * 100)}%` }]} />
              </View>
              {p.finished && <Icon name="check" size={11} color={T.teal} stroke={3} />}
            </View>
          ))}
        </Row>
      )}

      <Scroll contentStyle={{ padding: isSpotFlagQuestion ? 14 : 20, paddingTop: 18, gap: 18, alignItems: "center" }}>
        {!questionReady ? (
          <View style={styles.quizLoading}>
            <View className="spin" style={styles.loadingSpinner} />
            <Text style={styles.loadingTxt}>LOADING FLAG</Text>
          </View>
        ) : (
          <div key={tick} className="softFade" style={{ width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 18 }}>
            {question.type === "flagToName" ? (
              <React.Fragment>
                <Text style={styles.prompt}>IDENTIFY THE FLAG</Text>
                <View style={styles.flagSlot}>
                  <View style={styles.flagFrame}>
                    <Img uri={flagUrl(question.target.code, 640)} style={[styles.quizFlagImg, flagEdgeStyle(question.target.code)]} />
                  </View>
                </View>
                <View style={{ width: "100%", gap: 10, marginTop: 2 }}>
                  {question.options.map((c, idx) => {
                    const st = optColor(c);
                    return (
                      <Touchable key={c.code} className="press" disabled={!!selected} onPress={() => answer(c)}
                        style={[styles.answer, st === "correct" && styles.answerCorrect, st === "wrong" && styles.answerWrong]}>
                        <Row style={{ alignItems: "center", gap: 12 }}>
                          <View style={[styles.letter, st && styles.letterOn]}>
                            <Text style={[styles.letterTxt, st && { color: st === "correct" ? T.teal : T.red }]}>{String.fromCharCode(65 + idx)}</Text>
                          </View>
                          <Text style={[styles.answerTxt, st && { color: "#fff" }]}>{c.name}</Text>
                          <View style={{ flex: 1 }} />
                          {st === "correct" && <Icon name="check" size={20} color="#fff" stroke={3} />}
                          {st === "wrong" && <Icon name="x" size={19} color="#fff" stroke={3} />}
                        </Row>
                      </Touchable>
                    );
                  })}
                </View>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <Text style={styles.prompt}>PICK THE FLAG OF</Text>
                <Text style={styles.heroName}>{question.target.name}</Text>
                <Row style={{ flexWrap: "wrap", gap: 12, justifyContent: "center", alignItems: "flex-start", marginTop: 2, width: "100%" }}>
                  {question.options.map((c) => {
                    const st = optColor(c);
                    return (
                      <Touchable key={c.code} className="press" disabled={!!selected} onPress={() => answer(c)}
                        style={[styles.tile, st === "correct" && styles.tileCorrect, st === "wrong" && styles.tileWrong]}>
                        <Img uri={flagUrl(c.code, 320)} style={[styles.tileImg, flagEdgeStyle(c.code)]} />
                        {st && (
                          <View style={[styles.tileBadge, { background: st === "correct" ? T.teal : T.red }]}>
                            <Icon name={st === "correct" ? "check" : "x"} size={14} color="#fff" stroke={3} />
                          </View>
                        )}
                      </Touchable>
                    );
                  })}
                </Row>
              </React.Fragment>
            )}
          </div>
        )}
        <View style={{ height: 24 }} />
      </Scroll>
    </View>
  );
}

function BattleHeadToHead({ roomState, players, myId, liveReady = true, onAnswer, onQuit }) {
  const questions = roomState?.questions || [];
  const total = questions.length;
  const index = Math.min(roomState?.questionIndex || 0, Math.max(0, total - 1));
  const question = questions[index];
  const answers = roomState?.answers || {};
  const myAnswer = answers[myId];
  const roomScores = roomState?.matchScores || {};
  const displayPlayers = (() => {
    const byId = new Map();
    (roomState?.participants || []).forEach((p) => byId.set(p.id, { ...p, __isMe: p.id === myId }));
    (players || []).forEach((p) => byId.set(p.id, { ...byId.get(p.id), ...p, __isMe: p.id === myId || p.__isMe }));
    return Array.from(byId.values())
      .map((p) => ({ ...p, matchScore: roomScores[p.id] || 0 }))
      .sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
  })();
  const winner = roomState?.winnerId ? displayPlayers.find((p) => p.id === roomState.winnerId) : null;
  const [localSelected, setLocalSelected] = useState(null);
  const [questionReady, setQuestionReady] = useState(false);

  useEffect(() => {
    setLocalSelected(null);
    setQuestionReady(false);
    let cancelled = false;
    preloadQuestionAssets(question).then(() => { if (!cancelled) setQuestionReady(true); });
    if (questions[index + 1]) preloadQuestionAssets(questions[index + 1]);
    return () => { cancelled = true; };
  }, [roomState?.gameId, index]);

  const answer = (country) => {
    if (!liveReady || !questionReady || myAnswer || localSelected || !question) return;
    setLocalSelected(country.code);
    onAnswer(country, Date.now());
  };

  const selectedCode = myAnswer?.pickedCode || localSelected;
  const reveal = Boolean(myAnswer || roomState?.winnerId || roomState?.allAnswered);
  const optColor = (c) => {
    if (!reveal) return null;
    if (roomState?.winnerId && c.code === question.target.code) return "correct";
    if (selectedCode && c.code === selectedCode && c.code !== question.target.code) return "wrong";
    return null;
  };
  const isSpotFlagQuestion = question?.type === "nameToFlag";
  const answeredCount = Object.keys(answers).length;

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <Row style={styles.qTop}>
        <Touchable className="press" onPress={onQuit} style={styles.iconBtn}><Icon name="x" size={18} color={T.navy} stroke={2.6} /></Touchable>
        <View style={{ flex: 1, alignItems: "center" }}>
          <Text style={styles.statusTxt}>{Math.min(index + 1, total)} / {total}</Text>
        </View>
        <View style={styles.scoreChip}><Text style={styles.scoreTxt}>{displayPlayers.find((p) => p.__isMe)?.matchScore || 0}</Text></View>
      </Row>

      <Row style={styles.progressTrack}>
        {Array.from({ length: total }).map((_, i) => (
          <View key={i} style={[styles.progressSeg, i <= index && styles.progressSegOn]} />
        ))}
      </Row>

      <Row style={styles.battleLeaderStrip}>
        {displayPlayers.map((p) => (
          <View key={p.id} style={styles.battleLeaderChip}>
            <Text style={styles.battleLeaderName}>{(p.name || "?").slice(0, 8)}</Text>
            <Text style={styles.battleScoreTxt}>{p.matchScore || 0}</Text>
            {answers[p.id] && <Icon name="check" size={11} color={T.teal} stroke={3} />}
          </View>
        ))}
      </Row>

      <Scroll contentStyle={{ padding: isSpotFlagQuestion ? 14 : 20, paddingTop: 18, gap: 18, alignItems: "center" }}>
        {!questionReady || !question ? (
          <View style={styles.quizLoading}>
            <View className="spin" style={styles.loadingSpinner} />
            <Text style={styles.loadingTxt}>LOADING FLAG</Text>
          </View>
        ) : (
          <div key={`${roomState?.gameId}-${index}`} className="softFade" style={{ width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 18 }}>
            <Text style={styles.prompt}>{!liveReady ? "CONNECTING ROOM" : winner ? `${winner.name || "Player"} scored` : myAnswer || localSelected ? `WAITING // ${answeredCount}/${displayPlayers.length}` : "FIRST CORRECT SCORES"}</Text>
            {question.type === "flagToName" ? (
              <React.Fragment>
                <View style={styles.flagSlot}>
                  <View style={styles.flagFrame}>
                    <Img uri={flagUrl(question.target.code, 640)} style={[styles.quizFlagImg, flagEdgeStyle(question.target.code)]} />
                  </View>
                </View>
                <View style={{ width: "100%", gap: 10, marginTop: 2 }}>
                  {question.options.map((c, idx) => {
                    const st = optColor(c);
                    return (
                      <Touchable key={c.code} className="press" disabled={!liveReady || !!myAnswer || !!localSelected} onPress={() => answer(c)}
                        style={[styles.answer, st === "correct" && styles.answerCorrect, st === "wrong" && styles.answerWrong]}>
                        <Row style={{ alignItems: "center", gap: 12 }}>
                          <View style={[styles.letter, st && styles.letterOn]}>
                            <Text style={[styles.letterTxt, st && { color: st === "correct" ? T.teal : T.red }]}>{String.fromCharCode(65 + idx)}</Text>
                          </View>
                          <Text style={[styles.answerTxt, st && { color: "#fff" }]}>{c.name}</Text>
                          <View style={{ flex: 1 }} />
                          {st === "correct" && <Icon name="check" size={20} color="#fff" stroke={3} />}
                          {st === "wrong" && <Icon name="x" size={19} color="#fff" stroke={3} />}
                        </Row>
                      </Touchable>
                    );
                  })}
                </View>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <Text style={styles.heroName}>{question.target.name}</Text>
                <Row style={{ flexWrap: "wrap", gap: 12, justifyContent: "center", alignItems: "flex-start", marginTop: 2, width: "100%" }}>
                  {question.options.map((c) => {
                    const st = optColor(c);
                    return (
                      <Touchable key={c.code} className="press" disabled={!liveReady || !!myAnswer || !!localSelected} onPress={() => answer(c)}
                        style={[styles.tile, st === "correct" && styles.tileCorrect, st === "wrong" && styles.tileWrong]}>
                        <Img uri={flagUrl(c.code, 320)} style={[styles.tileImg, flagEdgeStyle(c.code)]} />
                        {st && (
                          <View style={[styles.tileBadge, { background: st === "correct" ? T.teal : T.red }]}>
                            <Icon name={st === "correct" ? "check" : "x"} size={14} color="#fff" stroke={3} />
                          </View>
                        )}
                      </Touchable>
                    );
                  })}
                </Row>
              </React.Fragment>
            )}
          </div>
        )}
        <View style={{ height: 24 }} />
      </Scroll>
    </View>
  );
}

function BattleRoom({ code, isHost, name, onLeave }) {
  const clientIdRef = useRef(randomClientId());
  const channelRef = useRef(null);
  const meMetaRef = useRef({ name, host: isHost, joinedAt: Date.now(), score: 0, index: 0, matchScore: 0, finished: false, elapsedMs: null });
  const activeGameIdRef = useRef(null);
  const completedGameIdRef = useRef(null);
  const roomStateRef = useRef(null);
  const liveChannelRef = useRef(null);
  const liveGameIdRef = useRef(null);
  const h2hAdvanceTimerRef = useRef(null);
  const stateBurstTimerRef = useRef(null);
  const roomPollBusyRef = useRef(false);
  const battleRoomTableReadyRef = useRef(true);
  const peerMapRef = useRef(new Map());
  const playersRef = useRef([]);
  const matchScoresRef = useRef({});
  const [players, setPlayers] = useState([]);
  const [status, setStatus] = useState("connecting"); // connecting | connected | full | error
  const [phase, setPhase] = useState("lobby"); // lobby | racing | done
  const [battleMode, setBattleMode] = useState("race");
  const [gameConfig, setGameConfig] = useState({ type: "flagToName", scope: "world", difficulty: "medium" });
  const [questions, setQuestions] = useState(null);
  const [roomState, setRoomState] = useState(null);
  const [battleStartedAt, setBattleStartedAt] = useState(null);
  const [liveReady, setLiveReady] = useState(false);
  const [matchScores, setMatchScores] = useState({});
  const [myResult, setMyResult] = useState(null);
  const [copied, setCopied] = useState(false);

  useEffect(() => { playersRef.current = players; }, [players]);
  useEffect(() => { matchScoresRef.current = matchScores; }, [matchScores]);

  const handleCopyCode = () => {
    navigator.clipboard?.writeText(code);
    setCopied(true);
    setTimeout(() => setCopied(false), 1600);
  };

  const selfPlayer = () => ({ id: clientIdRef.current, ...meMetaRef.current, __isMe: true });
  const lobbyParticipant = () => ({
    id: clientIdRef.current,
    name: meMetaRef.current.name,
    host: !!meMetaRef.current.host,
    joinedAt: meMetaRef.current.joinedAt,
    score: meMetaRef.current.score || 0,
    index: meMetaRef.current.index || 0,
    matchScore: meMetaRef.current.matchScore || 0,
    finished: !!meMetaRef.current.finished,
    elapsedMs: meMetaRef.current.elapsedMs || null,
  });

  const recentPeerPlayers = () => {
    const now = Date.now();
    const peers = [];
    for (const [id, entry] of peerMapRef.current.entries()) {
      if (!entry || now - entry.seenAt > BATTLE_PEER_STALE_MS) {
        peerMapRef.current.delete(id);
      } else if (entry.player) {
        peers.push({ ...entry.player, id, __isMe: id === clientIdRef.current });
      }
    }
    return peers;
  };

  const mergePlayerRecord = (current = {}, incoming = {}) => {
    const merged = { ...current, ...incoming };
    merged.index = Math.max(current.index || 0, incoming.index || 0);
    merged.score = Math.max(current.score || 0, incoming.score || 0);
    merged.finished = !!current.finished || !!incoming.finished;
    if (merged.finished) {
      merged.elapsedMs = incoming.finished && incoming.elapsedMs != null
        ? incoming.elapsedMs
        : current.finished && current.elapsedMs != null
          ? current.elapsedMs
          : incoming.elapsedMs ?? current.elapsedMs ?? null;
    } else {
      merged.elapsedMs = incoming.elapsedMs ?? current.elapsedMs ?? null;
    }
    return merged;
  };

  const mergeRoomPlayers = (list, scores, state = roomStateRef.current) => {
    const byId = new Map();
    list.forEach((p) => {
      byId.set(p.id, mergePlayerRecord(byId.get(p.id), { ...p, __isMe: p.id === clientIdRef.current || p.__isMe }));
    });
    recentPeerPlayers().forEach((p) => {
      byId.set(p.id, mergePlayerRecord(byId.get(p.id), { ...p, __isMe: p.id === clientIdRef.current || p.__isMe }));
    });
    (state?.participants || []).forEach((p) => {
      byId.set(p.id, mergePlayerRecord(byId.get(p.id), { ...p, __isMe: p.id === clientIdRef.current || byId.get(p.id)?.__isMe }));
    });
    byId.set(clientIdRef.current, mergePlayerRecord(byId.get(clientIdRef.current), selfPlayer()));
    return Array.from(byId.values())
      .map((p) => ({ ...p, matchScore: scores?.[p.id] || 0 }))
      .sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
  };

  const refreshPlayers = (baseList = playersRef.current, state = roomStateRef.current) => {
    const next = mergeRoomPlayers(baseList, state?.matchScores || matchScoresRef.current, state);
    playersRef.current = next;
    setPlayers(next);
    return next;
  };

  const trackMe = (channel = channelRef.current) => {
    if (!channel) return Promise.resolve();
    const meta = { ...meMetaRef.current };
    return channel.track(meta);
  };

  const sendBattleEvent = (event, payload, repeats = 0, interval = 260) => {
    const send = () => {
      const channel = liveChannelRef.current?.state === "joined" ? liveChannelRef.current : channelRef.current;
      if (!channel) return;
      channel.send({ type: "broadcast", event, payload });
    };
    send();
    for (let i = 1; i <= repeats; i++) setTimeout(send, i * interval);
  };

  const publishPeer = () => {
    const channel = channelRef.current;
    if (!channel || channel.state !== "joined") return;
    const player = {
      id: clientIdRef.current,
      name: meMetaRef.current.name,
      host: !!meMetaRef.current.host,
      joinedAt: meMetaRef.current.joinedAt,
      score: meMetaRef.current.score || 0,
      index: meMetaRef.current.index || 0,
      matchScore: meMetaRef.current.matchScore || 0,
      finished: !!meMetaRef.current.finished,
      elapsedMs: meMetaRef.current.elapsedMs || null,
    };
    channel.send({
      type: "broadcast",
      event: "battle-peer",
      payload: {
        type: "peer",
        player,
      },
    });
  };

  const receivePeer = (player, state) => {
    if (!player || !player.id || player.id === clientIdRef.current) return;
    peerMapRef.current.set(player.id, { player, seenAt: Date.now() });
    if (state) beginBattle(state);
    refreshPlayers();
  };

  const burstRoomState = (state = roomStateRef.current) => {
    if (!isHost || !state || !channelRef.current) return;
    const startedAt = Date.now();
    if (stateBurstTimerRef.current) clearInterval(stateBurstTimerRef.current);
    const sendState = () => {
      if (!channelRef.current || channelRef.current.state !== "joined") return;
      channelRef.current.send({ type: "broadcast", event: "battle-state", payload: packBattleState(roomStateRef.current || state) });
    };
    sendState();
    stateBurstTimerRef.current = setInterval(() => {
      if (Date.now() - startedAt > BATTLE_STATE_BURST_MS) {
        clearInterval(stateBurstTimerRef.current);
        stateBurstTimerRef.current = null;
        return;
      }
      sendState();
    }, BATTLE_STATE_BURST_INTERVAL_MS);
  };

  const applyMatchScores = (scores) => {
    const nextScores = scores || {};
    matchScoresRef.current = nextScores;
    setMatchScores(nextScores);
    setPlayers((list) => {
      const scored = mergeRoomPlayers(list, nextScores);
      playersRef.current = scored;
      return scored;
    });
  };

  const applyLobbyParticipants = (participants = []) => {
    if (!Array.isArray(participants) || !participants.length) return;
    const scored = mergeRoomPlayers(participants, matchScoresRef.current, roomStateRef.current);
    playersRef.current = scored;
    setPlayers(scored);
  };

  const cleanLobbyParticipants = (baseList = playersRef.current) => {
    const byId = new Map();
    mergeRoomPlayers(baseList, matchScoresRef.current, roomStateRef.current).forEach((p) => {
      byId.set(p.id, {
        id: p.id,
        name: p.name,
        host: !!p.host,
        joinedAt: p.joinedAt || Date.now(),
        score: 0,
        index: 0,
        matchScore: matchScoresRef.current[p.id] || p.matchScore || 0,
        finished: false,
        elapsedMs: null,
      });
    });
    byId.set(clientIdRef.current, {
      ...byId.get(clientIdRef.current),
      id: clientIdRef.current,
      name: meMetaRef.current.name,
      host: !!meMetaRef.current.host,
      joinedAt: meMetaRef.current.joinedAt,
      score: 0,
      index: 0,
      matchScore: matchScoresRef.current[clientIdRef.current] || meMetaRef.current.matchScore || 0,
      finished: false,
      elapsedMs: null,
    });
    return Array.from(byId.values()).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
  };

  const resetBattleToLobby = (participants = playersRef.current) => {
    const lobbyPlayers = cleanLobbyParticipants(participants);
    activeGameIdRef.current = null;
    completedGameIdRef.current = null;
    roomStateRef.current = null;
    if (liveChannelRef.current) {
      supabaseClient?.removeChannel(liveChannelRef.current);
      liveChannelRef.current = null;
    }
    liveGameIdRef.current = null;
    meMetaRef.current = {
      ...meMetaRef.current,
      score: 0,
      index: 0,
      matchScore: matchScoresRef.current[clientIdRef.current] || meMetaRef.current.matchScore || 0,
      finished: false,
      elapsedMs: null,
    };
    setQuestions(null);
    setRoomState(null);
    setBattleStartedAt(null);
    setLiveReady(false);
    setMyResult(null);
    setPhase("lobby");
    applyLobbyParticipants(lobbyPlayers);
    trackMe();
    publishPeer();
    return lobbyPlayers;
  };

  const persistLobbyRoom = async (participants) => {
    if (!supabaseClient || !battleRoomTableReadyRef.current) return;
    const lobbyRoom = {
      type: "lobby",
      roomCode: code,
      participants,
      mode: battleMode,
      config: gameConfig,
      updatedAt: Date.now(),
    };
    const { error } = await supabaseClient
      .from(BATTLE_ROOMS_TABLE)
      .upsert({ room_code: code, room: lobbyRoom }, { onConflict: "room_code" });
    if (error) {
      battleRoomTableReadyRef.current = false;
      console.warn("Battle room table unavailable; falling back to realtime only.", error.message || error);
      return;
    }
    channelRef.current?.send({ type: "broadcast", event: "battle-state", payload: lobbyRoom });
  };

  const applyBattleRoomSnapshot = (room) => {
    if (!room || typeof room !== "object") return;
    if (room.type === "start") {
      beginBattle(room);
      return;
    }
    if (room.type === "lobby") {
      if (activeGameIdRef.current || completedGameIdRef.current || roomStateRef.current) {
        resetBattleToLobby(room.participants);
      } else {
        applyLobbyParticipants(room.participants);
      }
    }
  };

  const persistBattleRoomState = async (state = roomStateRef.current) => {
    if (!supabaseClient || !state || !battleRoomTableReadyRef.current) return;
    const payload = packBattleState(state);
    const { error } = await supabaseClient
      .from(BATTLE_ROOMS_TABLE)
      .upsert({ room_code: code, room: payload }, { onConflict: "room_code" });
    if (error) {
      battleRoomTableReadyRef.current = false;
      console.warn("Battle room table unavailable; falling back to realtime only.", error.message || error);
    }
  };

  const fetchBattleRoomState = async () => {
    if (!supabaseClient || !battleRoomTableReadyRef.current || roomPollBusyRef.current) return;
    roomPollBusyRef.current = true;
    try {
      const { data, error } = await supabaseClient
        .from(BATTLE_ROOMS_TABLE)
        .select("room")
        .eq("room_code", code)
        .maybeSingle();
      if (error) {
        battleRoomTableReadyRef.current = false;
        console.warn("Battle room table unavailable; falling back to realtime only.", error.message || error);
        return;
      }
      if (data?.room) applyBattleRoomSnapshot(data.room);
    } finally {
      roomPollBusyRef.current = false;
    }
  };

  const persistLobbyParticipant = async () => {
    if (!supabaseClient || !battleRoomTableReadyRef.current) return;
    try {
      const { data, error } = await supabaseClient
        .from(BATTLE_ROOMS_TABLE)
        .select("room")
        .eq("room_code", code)
        .maybeSingle();
      if (error) {
        battleRoomTableReadyRef.current = false;
        console.warn("Battle room table unavailable; falling back to realtime only.", error.message || error);
        return;
      }
      const existing = data?.room && typeof data.room === "object" ? data.room : null;
      if (existing?.type === "start") {
        applyBattleRoomSnapshot(existing);
        return;
      }
      const mine = lobbyParticipant();
      const byId = new Map((existing?.participants || []).map((p) => [p.id, p]));
      byId.set(mine.id, { ...byId.get(mine.id), ...mine });
      const participants = Array.from(byId.values()).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
      const lobbyRoom = {
        type: "lobby",
        roomCode: code,
        participants,
        updatedAt: Date.now(),
      };
      const { error: upsertError } = await supabaseClient
        .from(BATTLE_ROOMS_TABLE)
        .upsert({ room_code: code, room: lobbyRoom }, { onConflict: "room_code" });
      if (upsertError) {
        battleRoomTableReadyRef.current = false;
        console.warn("Battle room table unavailable; falling back to realtime only.", upsertError.message || upsertError);
        return;
      }
      applyLobbyParticipants(participants);
    } catch (err) {
      console.warn("Battle room table unavailable; falling back to realtime only.", err?.message || err);
      battleRoomTableReadyRef.current = false;
    }
  };

  const loadDurableLobbyParticipants = async () => {
    if (!supabaseClient || !battleRoomTableReadyRef.current) return [];
    try {
      const { data, error } = await supabaseClient
        .from(BATTLE_ROOMS_TABLE)
        .select("room")
        .eq("room_code", code)
        .maybeSingle();
      if (error) {
        battleRoomTableReadyRef.current = false;
        return [];
      }
      const participants = data?.room?.type === "lobby" && Array.isArray(data.room.participants)
        ? data.room.participants
        : [];
      if (participants.length) applyLobbyParticipants(participants);
      return participants;
    } catch (_err) {
      battleRoomTableReadyRef.current = false;
      return [];
    }
  };

  const persistActivePlayerProgress = async () => {
    const state = roomStateRef.current;
    if (!supabaseClient || !state || state.type !== "start" || !battleRoomTableReadyRef.current) return;
    try {
      const { data, error } = await supabaseClient
        .from(BATTLE_ROOMS_TABLE)
        .select("room")
        .eq("room_code", code)
        .maybeSingle();
      if (error) {
        battleRoomTableReadyRef.current = false;
        return;
      }
      const latest = data?.room?.type === "start" ? unpackBattleState(data.room) : state;
      const mine = lobbyParticipant();
      const byId = new Map((latest.participants || state.participants || []).map((p) => [p.id, p]));
      byId.set(mine.id, { ...byId.get(mine.id), ...mine });
      const participants = Array.from(byId.values()).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
      const nextState = {
        ...latest,
        participants,
        matchScores: state.matchScores || latest.matchScores || {},
        stateVersion: Math.max(latest.stateVersion || 0, state.stateVersion || 0),
      };
      const { error: upsertError } = await supabaseClient
        .from(BATTLE_ROOMS_TABLE)
        .upsert({ room_code: code, room: packBattleState(nextState) }, { onConflict: "room_code" });
      if (upsertError) {
        battleRoomTableReadyRef.current = false;
        return;
      }
      roomStateRef.current = { ...roomStateRef.current, participants };
      channelRef.current?.send({ type: "broadcast", event: "battle-state", payload: packBattleState(nextState) });
      applyLobbyParticipants(participants);
    } catch (_err) {
      battleRoomTableReadyRef.current = false;
    }
  };

  const publishRoomState = (nextState) => {
    const versionedState = {
      ...nextState,
      stateVersion: Math.max(nextState?.stateVersion || 0, (roomStateRef.current?.stateVersion || 0) + 1),
    };
    roomStateRef.current = versionedState;
    setRoomState(versionedState);
    const nextScores = versionedState?.matchScores || {};
    applyMatchScores(nextScores);
    meMetaRef.current = {
      ...meMetaRef.current,
      matchScore: nextScores[clientIdRef.current] || 0,
    };
    trackMe();
    persistBattleRoomState(versionedState);
    channelRef.current?.send({ type: "broadcast", event: "battle-state", payload: packBattleState(versionedState) });
    burstRoomState(versionedState);
    return versionedState;
  };

  const handleIncomingBattleAnswer = (payload) => {
    if (!payload || payload.type !== "answer") return;
    if (isHost) recordHeadToHeadAnswer(payload);
    else applyHeadToHeadAnswer(payload);
  };

  const handleIncomingBattleAdvance = (payload) => {
    applyHeadToHeadAdvance(payload);
  };

  const setupLiveChannel = (gameId) => {
    if (!supabaseClient || !gameId || liveGameIdRef.current === gameId) return;
    if (liveChannelRef.current) supabaseClient.removeChannel(liveChannelRef.current);
    liveGameIdRef.current = gameId;
    setLiveReady(false);
    const liveChannel = supabaseClient.channel(`battle-live-${code}-${gameId}`, {
      config: { broadcast: { self: true } },
    });
    liveChannelRef.current = liveChannel;
    liveChannel.on("broadcast", { event: "battle-answer" }, ({ payload }) => handleIncomingBattleAnswer(payload));
    liveChannel.on("broadcast", { event: "battle-advance" }, ({ payload }) => handleIncomingBattleAdvance(payload));
    liveChannel.subscribe((liveStatus) => {
      if (liveStatus === "SUBSCRIBED") setLiveReady(true);
      if (liveStatus === "CHANNEL_ERROR" || liveStatus === "TIMED_OUT" || liveStatus === "CLOSED") setLiveReady(false);
    });
  };

  const beginBattle = (payload) => {
    const state = unpackBattleState(payload);
    if (!state || state.type !== "start" || !Array.isArray(state.questions) || !state.questions.length) return;
    const gameId = state.gameId || `${state.startedAt || Date.now()}`;
    if (state.mode === "headToHead") setupLiveChannel(gameId);
    if (completedGameIdRef.current === gameId) {
      const nextScores = state.matchScores || matchScoresRef.current;
      roomStateRef.current = { ...roomStateRef.current, ...state };
      setRoomState(roomStateRef.current);
      applyMatchScores(nextScores);
      refreshPlayers(state.participants || playersRef.current, roomStateRef.current);
      setBattleMode(state.mode || battleMode);
      return;
    }
    if (activeGameIdRef.current === gameId) {
      const incomingVersion = state.stateVersion || 0;
      const currentVersion = roomStateRef.current?.stateVersion || 0;
      if (incomingVersion && currentVersion && incomingVersion < currentVersion) return;
      const nextScores = state.matchScores || matchScoresRef.current;
      roomStateRef.current = state;
      setRoomState(state);
      applyMatchScores(nextScores);
      meMetaRef.current = { ...meMetaRef.current, matchScore: nextScores[clientIdRef.current] || 0 };
      trackMe();
      publishPeer();
      setBattleMode(state.mode || battleMode);
      setPhase(state.phase === "done" ? "done" : "racing");
      return;
    }
    activeGameIdRef.current = gameId;
    completedGameIdRef.current = null;
    const nextScores = state.matchScores || matchScoresRef.current;
    meMetaRef.current = {
      ...meMetaRef.current,
      score: 0,
      index: 0,
      matchScore: nextScores[clientIdRef.current] || 0,
      finished: false,
      elapsedMs: null,
    };
    setGameConfig(state.config || gameConfig);
    const resetParticipants = (state.participants || []).map((p) => ({
      ...p,
      score: 0,
      index: 0,
      finished: false,
      elapsedMs: null,
    }));
    const startState = { ...state, participants: resetParticipants };
    peerMapRef.current.clear();
    setQuestions(startState.questions);
    setRoomState(startState);
    roomStateRef.current = startState;
    matchScoresRef.current = nextScores;
    setMatchScores(nextScores);
    refreshPlayers(resetParticipants, startState);
    trackMe();
    publishPeer();
    setBattleMode(startState.mode || battleMode);
    setBattleStartedAt(startState.startedAt || Date.now());
    setMyResult(null);
    setPhase("racing");
  };

  useEffect(() => {
    if (!supabaseClient) { setStatus("error"); return; }
    let cancelled = false;
    const channel = supabaseClient.channel(`battle-room-${code}`, {
      config: { broadcast: { self: true }, presence: { key: clientIdRef.current } },
    });
    channelRef.current = channel;

    // My own presence update can lag behind a flaky connection; the local
    // meMetaRef is always accurate, so it wins over whatever the server echoes back.
    const applyHostPresenceRoom = (presence = channel.presenceState()) => {
      const hostMeta = Object.entries(presence)
        .map(([id, metas]) => metas.length ? { id, ...metas[metas.length - 1] } : null)
        .filter(Boolean)
        .find((p) => p.id !== clientIdRef.current && p.host && p.room);
      if (hostMeta?.room) beginBattle(hostMeta.room);
    };

    const syncPlayers = () => {
      const state = channel.presenceState();
      const list = Object.entries(state)
        .map(([id, metas]) => metas.length ? { id, ...metas[metas.length - 1] } : null)
        .filter(Boolean)
        .sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0))
        .map((p) => p.id === clientIdRef.current
          ? { ...p, ...meMetaRef.current, __isMe: true }
          : { ...p, __isMe: false });
      const hasMe = list.some((p) => p.id === clientIdRef.current);
      const nextList = hasMe
        ? list
        : [{ id: clientIdRef.current, ...meMetaRef.current, __isMe: true }, ...list]
            .sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
      const hostMeta = list.find((p) => p.id !== clientIdRef.current && p.host && p.room);
      if (hostMeta?.room) beginBattle(hostMeta.room);
      const scoredList = mergeRoomPlayers(nextList, roomStateRef.current?.matchScores || matchScoresRef.current, roomStateRef.current);
      playersRef.current = scoredList;
      setPlayers(scoredList);
    };

    channel.on("broadcast", { event: "battle" }, ({ payload }) => {
      if (!payload || payload.type !== "start") return;
      beginBattle(payload);
    });
    channel.on("broadcast", { event: "battle-state" }, ({ payload }) => {
      applyBattleRoomSnapshot(payload);
    });
    channel.on("broadcast", { event: "battle-answer" }, ({ payload }) => handleIncomingBattleAnswer(payload));
    channel.on("broadcast", { event: "battle-advance" }, ({ payload }) => handleIncomingBattleAdvance(payload));
    channel.on("broadcast", { event: "battle-peer" }, ({ payload }) => {
      if (!payload || payload.type !== "peer") return;
      receivePeer(payload.player, payload.state);
    });
    channel.on("broadcast", { event: "battle-request-state" }, ({ payload }) => {
      if (!isHost || !roomStateRef.current || payload?.from === clientIdRef.current) return;
      burstRoomState(roomStateRef.current);
    });
    channel.on("presence", { event: "sync" }, syncPlayers);
    channel.on("presence", { event: "join" }, syncPlayers);
    channel.on("presence", { event: "leave" }, syncPlayers);

    channel.subscribe(async (subStatus) => {
      if (cancelled) return;
      if (subStatus === "SUBSCRIBED") {
        const existing = Object.keys(channel.presenceState()).length;
        if (!isHost && existing >= MAX_BATTLE_PLAYERS) {
          setStatus("full");
          return;
        }
        await trackMe(channel);
        setStatus("connected");
        syncPlayers();
        persistLobbyParticipant();
        publishPeer();
        channel.send({ type: "broadcast", event: "battle-request-state", payload: { type: "request-state", from: clientIdRef.current } });
        if (!isHost) fetchBattleRoomState();
      } else if (subStatus === "CHANNEL_ERROR" || subStatus === "TIMED_OUT") {
        setStatus("error");
      }
    });

    // Realtime presence can silently drop after a brief disconnect; re-asserting
    // periodically lets a client self-heal once the underlying socket reconnects.
    const heartbeat = setInterval(() => {
      if (channel.state === "joined") {
        trackMe(channel);
        persistLobbyParticipant();
        publishPeer();
        if (isHost && roomStateRef.current) {
          channel.send({ type: "broadcast", event: "battle-state", payload: packBattleState(roomStateRef.current) });
        }
        if (!isHost) {
          applyHostPresenceRoom();
          fetchBattleRoomState();
          channel.send({ type: "broadcast", event: "battle-request-state", payload: { type: "request-state", from: clientIdRef.current } });
        } else if (activeGameIdRef.current) {
          fetchBattleRoomState();
        }
      }
    }, BATTLE_HEARTBEAT_MS);

    const roomPoll = setInterval(() => {
      if (!isHost || activeGameIdRef.current) fetchBattleRoomState();
    }, BATTLE_ROOM_POLL_MS);

    return () => {
      cancelled = true;
      clearInterval(heartbeat);
      clearInterval(roomPoll);
      if (h2hAdvanceTimerRef.current) clearTimeout(h2hAdvanceTimerRef.current);
      if (stateBurstTimerRef.current) clearInterval(stateBurstTimerRef.current);
      supabaseClient.removeChannel(channel);
      if (liveChannelRef.current) {
        supabaseClient.removeChannel(liveChannelRef.current);
        liveChannelRef.current = null;
      }
      liveGameIdRef.current = null;
    };
  }, [code]);

  const updateMe = (patch) => {
    meMetaRef.current = { ...meMetaRef.current, ...patch };
    trackMe();
    publishPeer();
    persistActivePlayerProgress();
    // Don't wait on a network round-trip to show my own progress.
    setPlayers((list) => {
      let foundMe = false;
      const next = list.map((p) => {
        if (!p.__isMe) return p;
        foundMe = true;
        return { ...p, ...meMetaRef.current };
      });
      if (!foundMe) next.push({ id: clientIdRef.current, ...meMetaRef.current, __isMe: true });
      return next.sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
    });
  };

  const publishHeadToHeadAdvance = (state) => {
    if (!state || state.mode !== "headToHead") return;
    sendBattleEvent("battle-advance", {
      type: "advance",
      gameId: state.gameId,
      phase: state.phase,
      questionIndex: state.questionIndex || 0,
      questionStartedAt: state.questionStartedAt || Date.now(),
      matchScores: state.matchScores || {},
      stateVersion: state.stateVersion || 0,
      allAnswered: !!state.allAnswered,
    }, 8);
  };

  const applyHeadToHeadAdvance = (payload) => {
    if (!payload || payload.type !== "advance") return;
    const current = roomStateRef.current;
    if (!current || current.mode !== "headToHead" || payload.gameId !== current.gameId) return;
    const incomingVersion = payload.stateVersion || 0;
    const currentVersion = current.stateVersion || 0;
    if (incomingVersion && currentVersion && incomingVersion < currentVersion) return;
    beginBattle({
      ...current,
      phase: payload.phase || "racing",
      questionIndex: payload.questionIndex || 0,
      questionStartedAt: payload.questionStartedAt || Date.now(),
      answers: {},
      winnerId: null,
      allAnswered: !!payload.allAnswered,
      matchScores: payload.matchScores || current.matchScores || {},
      stateVersion: incomingVersion || currentVersion + 1,
    });
  };

  const advanceLocalHeadToHead = () => {
    const state = roomStateRef.current;
    if (!state || state.mode !== "headToHead" || state.phase === "done") return;
    const nextIndex = (state.questionIndex || 0) + 1;
    if (nextIndex >= state.questions.length) {
      const doneState = {
        ...state,
        phase: "done",
        answers: {},
        winnerId: null,
        allAnswered: true,
        stateVersion: (state.stateVersion || 0) + 1,
      };
      beginBattle(doneState);
      applyMatchScores(doneState.matchScores || {});
      setPhase("done");
      return;
    }
    beginBattle({
      ...state,
      phase: "racing",
      questionIndex: nextIndex,
      questionStartedAt: Date.now(),
      answers: {},
      winnerId: null,
      allAnswered: false,
      stateVersion: (state.stateVersion || 0) + 1,
    });
  };

  const scheduleHeadToHeadAdvance = (delay = 950) => {
    if (h2hAdvanceTimerRef.current) clearTimeout(h2hAdvanceTimerRef.current);
    h2hAdvanceTimerRef.current = setTimeout(() => {
      if (isHost) advanceHeadToHead();
      else advanceLocalHeadToHead();
    }, delay);
  };

  const advanceHeadToHead = () => {
    if (!isHost) return;
    const state = roomStateRef.current;
    if (!state || state.mode !== "headToHead" || state.phase === "done") return;
    const nextIndex = (state.questionIndex || 0) + 1;
    if (nextIndex >= state.questions.length) {
      const doneState = publishRoomState({ ...state, phase: "done", answers: {}, allAnswered: true, winnerId: null });
      publishHeadToHeadAdvance(doneState);
      applyMatchScores(doneState.matchScores || {});
      setPhase("done");
      return;
    }
    const nextState = publishRoomState({
      ...state,
      phase: "racing",
      questionIndex: nextIndex,
      questionStartedAt: Date.now(),
      answers: {},
      winnerId: null,
      allAnswered: false,
    });
    publishHeadToHeadAdvance(nextState);
  };

  const recordHeadToHeadAnswer = (payload) => {
    if (!isHost) return;
    const state = roomStateRef.current;
    if (!state || state.mode !== "headToHead" || state.phase === "done") return;
    if (payload.gameId !== state.gameId || payload.questionIndex !== state.questionIndex) return;
    const playerId = payload.playerId;
    if (!playerId || state.answers?.[playerId]) return;

    const question = state.questions[state.questionIndex];
    if (!question) return;
    const correct = payload.pickedCode === question.target.code;
    const answers = {
      ...(state.answers || {}),
      [playerId]: {
        pickedCode: payload.pickedCode,
        answeredAt: payload.answeredAt || Date.now(),
        correct,
      },
    };
    const nextScores = { ...(state.matchScores || {}) };
    let winnerId = state.winnerId || null;
    if (correct && !winnerId) {
      winnerId = playerId;
      nextScores[playerId] = (nextScores[playerId] || 0) + 1;
    }
    const currentPlayers = playersRef.current;
    const activeIds = currentPlayers.length ? currentPlayers.map((p) => p.id) : Object.keys(nextScores);
    const allAnswered = activeIds.length > 0 && activeIds.every((id) => answers[id]);
    const nextState = { ...state, answers, winnerId, allAnswered, matchScores: nextScores };
    publishRoomState(nextState);
    if (winnerId) scheduleHeadToHeadAdvance(1050);
    else if (allAnswered) scheduleHeadToHeadAdvance(1250);
  };

  const applyHeadToHeadAnswer = (payload) => {
    if (!payload || payload.type !== "answer" || isHost) return;
    const state = roomStateRef.current;
    if (!state || state.mode !== "headToHead" || state.phase === "done") return;
    if (payload.gameId !== state.gameId || payload.questionIndex !== state.questionIndex) return;
    const playerId = payload.playerId;
    if (!playerId || state.answers?.[playerId]) return;

    const question = state.questions[state.questionIndex];
    if (!question) return;
    const correct = payload.pickedCode === question.target.code;
    const answers = {
      ...(state.answers || {}),
      [playerId]: {
        pickedCode: payload.pickedCode,
        answeredAt: payload.answeredAt || Date.now(),
        correct,
      },
    };
    const nextScores = { ...(state.matchScores || {}) };
    let winnerId = state.winnerId || null;
    if (correct && !winnerId) {
      winnerId = playerId;
      nextScores[playerId] = (nextScores[playerId] || 0) + 1;
    }
    const activeIds = (state.participants || playersRef.current || []).map((p) => p.id).filter(Boolean);
    const allAnswered = activeIds.length > 0 && activeIds.every((id) => answers[id]);
    beginBattle({
      ...state,
      answers,
      winnerId,
      allAnswered,
      matchScores: nextScores,
      stateVersion: (state.stateVersion || 0) + 1,
    });
  };

  const handleStart = async () => {
    const durableParticipants = await loadDurableLobbyParticipants();
    const qs = makeBattleQuestions(gameConfig, BATTLE_ROUNDS);
    if (qs.length < 2 || !channelRef.current) return;
    const baseScores = { ...matchScoresRef.current };
    const startPlayers = durableParticipants.length
      ? mergeRoomPlayers(durableParticipants, baseScores)
      : playersRef.current;
    startPlayers.forEach((p) => { if (baseScores[p.id] == null) baseScores[p.id] = 0; });
    if (baseScores[clientIdRef.current] == null) baseScores[clientIdRef.current] = 0;
    const roster = mergeRoomPlayers(startPlayers, baseScores);
    if (!roster.some((p) => p.id === clientIdRef.current)) {
      roster.push({ id: clientIdRef.current, ...meMetaRef.current, __isMe: true, matchScore: baseScores[clientIdRef.current] || 0 });
    }
    const participants = roster
      .map(({ id, name, host, joinedAt }) => ({ id, name, host: !!host, joinedAt }));
    const payload = {
      type: "start",
      gameId: `g${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`,
      mode: battleMode,
      questions: qs,
      config: gameConfig,
      participants,
      startedAt: Date.now(),
      matchScores: baseScores,
      phase: "racing",
      questionIndex: 0,
      questionStartedAt: Date.now(),
      answers: {},
      winnerId: null,
      allAnswered: false,
      stateVersion: 1,
    };
    if (isHost) {
      meMetaRef.current = { ...meMetaRef.current };
      trackMe();
    }
    beginBattle(payload);
    persistBattleRoomState(payload);
    channelRef.current.send({
      type: "broadcast",
      event: "battle",
      payload: packBattleState(payload),
    });
    channelRef.current.send({ type: "broadcast", event: "battle-state", payload: packBattleState(payload) });
    burstRoomState(payload);
  };

  const handleChangeSetup = async () => {
    if (!isHost) return;
    const participants = resetBattleToLobby(playersRef.current);
    await persistLobbyRoom(participants);
  };

  const handleFinishRace = (result) => {
    completedGameIdRef.current = activeGameIdRef.current;
    setMyResult(result);
    updateMe({ score: result.score, index: BATTLE_ROUNDS, finished: true, elapsedMs: result.elapsedMs });
    setPhase("done");
  };

  const handleHeadToHeadAnswer = (country, answeredAt) => {
    const state = roomStateRef.current;
    if (!state || state.mode !== "headToHead") return;
    const payload = {
      type: "answer",
      gameId: state.gameId,
      questionIndex: state.questionIndex,
      playerId: clientIdRef.current,
      pickedCode: country.code,
      answeredAt,
    };
    sendBattleEvent("battle-answer", payload, 8);
    if (isHost) recordHeadToHeadAnswer(payload);
  };

  const handleLeave = () => {
    if (channelRef.current) supabaseClient.removeChannel(channelRef.current);
    onLeave();
  };

  if (status === "full" || status === "error") {
    return (
      <View style={{ flex: 1, minHeight: 0 }}>
        <AppHeader kicker="MULTIPLAYER" title="BATTLE" />
        <Scroll contentStyle={{ padding: 18, paddingTop: 16, gap: 14 }}>
          <Module label={status === "full" ? "ROOM FULL" : "CONNECTION ERROR"} tone="red">
            <Text style={styles.authNotice}>
              {status === "full"
                ? `This room already has ${MAX_BATTLE_PLAYERS} players. Ask the host for a new room, or create your own.`
                : "Couldn't connect to the battle room. Check your connection and try again."}
            </Text>
            <Touchable className="press" onPress={handleLeave} style={styles.secondaryBtn}>
              <Icon name="x" size={17} color={T.navy} stroke={2.4} />
              <Text style={styles.secondaryTxt}>Back</Text>
            </Touchable>
          </Module>
        </Scroll>
      </View>
    );
  }

  if (phase === "racing" && battleMode === "headToHead" && roomState) {
    return (
      <BattleHeadToHead
        roomState={roomState}
        players={players}
        myId={clientIdRef.current}
        liveReady={liveReady}
        onAnswer={handleHeadToHeadAnswer}
        onQuit={handleLeave}
      />
    );
  }

  if (phase === "racing" && questions) {
    return (
      <BattleRace
        questions={questions}
        players={players}
        startedAt={battleStartedAt}
        onProgress={(idx, sc) => updateMe({ index: idx, score: sc })}
        onFinish={handleFinishRace}
        onQuit={handleLeave}
      />
    );
  }

  if (phase === "done") {
    const ranked = [...players].sort((a, b) => {
      if (battleMode === "headToHead") {
        if ((b.matchScore || 0) !== (a.matchScore || 0)) return (b.matchScore || 0) - (a.matchScore || 0);
        return (a.joinedAt || 0) - (b.joinedAt || 0);
      }
      if (!!b.finished !== !!a.finished) return b.finished ? 1 : -1;
      if ((b.score || 0) !== (a.score || 0)) return (b.score || 0) - (a.score || 0);
      if (a.finished && b.finished) return (a.elapsedMs || 0) - (b.elapsedMs || 0);
      return (b.index || 0) - (a.index || 0);
    });
    return (
      <View style={{ flex: 1, minHeight: 0 }}>
        <Scroll contentStyle={{ padding: 20, gap: 16 }}>
          <View style={{ alignItems: "center", gap: 8, marginTop: 14 }}>
            <Text style={styles.resTitle}>{battleMode === "headToHead" ? "MATCH RESULTS" : "BATTLE RESULTS"}</Text>
            <Text style={styles.resLog}>ROOM {code} // {battleMode === "headToHead" ? "HEAD-TO-HEAD" : "RACE"}</Text>
          </View>
          {(myResult || battleMode === "headToHead") && (
            <View style={styles.medalWrap} className="bobIn">
              <View style={styles.medalInner}>
                <Icon name="trophy" size={24} color={T.navy} stroke={2} />
                <Text style={styles.medalPct}>{battleMode === "headToHead" ? (matchScores[clientIdRef.current] || 0) : myResult.score}<Text style={styles.medalPctUnit}>/{BATTLE_ROUNDS}</Text></Text>
                <Text style={styles.medalLbl}>{battleMode === "headToHead" ? "MATCH PTS" : "YOUR SCORE"}</Text>
              </View>
            </View>
          )}
          <Module label={`STANDINGS // ${ranked.length}`} tone="teal">
            {ranked.map((p, i) => (
              <BattlePlayerRow
                key={p.id || i}
                player={p}
                rank={i + 1}
                scoreMode={battleMode === "headToHead" ? "match" : "round"}
              />
            ))}
          </Module>
          <View style={styles.resultActions}>
            <Row style={{ gap: 12 }}>
              <Touchable className="press" onPress={handleLeave} style={[styles.secondaryBtn, styles.resultActionBtn, { flex: 1 }]}>
                <Icon name="x" size={17} color={T.navy} stroke={2.2} /><Text style={styles.secondaryTxt}>Leave</Text>
              </Touchable>
              {isHost && (
                <Touchable className="press" onPress={handleChangeSetup} style={[styles.secondaryBtn, styles.resultActionBtn, { flex: 1.45 }]}>
                  <Icon name="grid" size={17} color={T.navy} stroke={2.2} /><Text style={styles.secondaryTxt}>Change Setup</Text>
                </Touchable>
              )}
            </Row>
            {isHost && (
              <Touchable className="press" onPress={handleStart} style={[styles.primaryBtn, styles.resultActionBtn, { marginTop: 10 }]}>
                <Icon name="refresh" size={18} color={T.onRed} stroke={2.4} /><Text style={styles.primaryTxt}>Play Again</Text>
              </Touchable>
            )}
            {!isHost && <Text style={[styles.authNotice, { textAlign: "center", marginTop: 8 }]}>Waiting for the host to start a rematch...</Text>}
          </View>
          <View style={{ height: 28 }} />
        </Scroll>
      </View>
    );
  }

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <AppHeader kicker="MULTIPLAYER" title="BATTLE" />
      <Scroll contentStyle={{ padding: 18, paddingTop: 16, gap: 16 }}>
        <Module label="ROOM CODE" tone="teal" right={<Text style={styles.authPill}>{players.length}/{MAX_BATTLE_PLAYERS}</Text>}>
          <View style={{ alignItems: "center", gap: 12 }}>
            <Text style={styles.battleCode}>{code}</Text>
            <Touchable className="press" onPress={handleCopyCode} style={styles.battleCopyBtn}>
              <Icon name={copied ? "check" : "copy"} size={15} color={copied ? T.teal : T.navy} stroke={2.3} />
              <Text style={[styles.battleCopyTxt, copied && { color: T.teal }]}>{copied ? "COPIED" : "COPY"}</Text>
            </Touchable>
          </View>
          <Text style={[styles.optDesc, { textAlign: "center" }]}>Share this code with friends so they can join from the Battle tab.</Text>
        </Module>

        <Module label={`PLAYERS // ${players.length}`}>
          {players.length ? players.map((p, i) => <BattlePlayerRow key={p.id || i} player={p} rank={i + 1} />) : (
            <Text style={styles.authNotice}>Connecting...</Text>
          )}
        </Module>

        {isHost ? (
          <React.Fragment>
            <Module label="BATTLE TYPE" tone="teal">
              <Row style={{ gap: 10 }}>
                {BATTLE_MODES.map((mode) => {
                  const on = battleMode === mode.key;
                  return (
                    <Touchable key={mode.key} className="press" onPress={() => setBattleMode(mode.key)} style={[styles.modeCard, { flex: 1 }, on && styles.modeCardOn]}>
                      <View style={styles.modeIcon}><Icon name={mode.icon} size={20} color={T.navy} stroke={2.1} /></View>
                      <Text style={styles.modeTitle}>{mode.label}</Text>
                      <Text style={styles.modeDesc}>{mode.desc}</Text>
                    </Touchable>
                  );
                })}
              </Row>
            </Module>
            <Module label="QUIZ MODE">
              {DIRECTIONS.map((d) => {
                const on = gameConfig.type === d.key;
                return (
                  <Touchable key={d.key} className="press" onPress={() => setGameConfig((c) => ({ ...c, type: d.key }))} style={[styles.optCard, on && styles.optCardOn]}>
                    <Row style={{ alignItems: "center", gap: 12 }}>
                      <View style={styles.optIcon}><Icon name={d.icon} size={22} color={T.navy} stroke={2.1} /></View>
                      <View style={{ flex: 1, gap: 2 }}>
                        <Text style={styles.optTitle}>{d.label}</Text>
                        <Text style={styles.optDesc}>{d.desc}</Text>
                      </View>
                      <Radio on={on} />
                    </Row>
                  </Touchable>
                );
              })}
            </Module>
            <Module label="REGION">
              <RegionGrid value={gameConfig.scope} onChange={(scope) => setGameConfig((c) => ({ ...c, scope: toggleScope(c.scope, scope) }))} />
            </Module>
            <Module label="DIFFICULTY">
              <DifficultyTabs value={gameConfig.difficulty} onChange={(difficulty) => setGameConfig((c) => ({ ...c, difficulty }))} />
            </Module>
            <Touchable className="press" onPress={handleStart} style={styles.primaryBtn}>
              <Icon name="swords" size={17} color={T.onRed} stroke={2.2} />
              <Text style={styles.primaryTxt}>Start Battle</Text>
            </Touchable>
            <Text style={styles.authNotice}>You can start solo to try it out, or wait for friends to join with the room code above.</Text>
          </React.Fragment>
        ) : (
          <Module label="STATUS" tone="red">
            <Text style={styles.authNotice}>Waiting for the host to start the battle...</Text>
          </Module>
        )}

        <Touchable className="press" onPress={handleLeave} style={styles.secondaryBtn}>
          <Icon name="x" size={17} color={T.navy} stroke={2.4} />
          <Text style={styles.secondaryTxt}>Leave Room</Text>
        </Touchable>
        <View style={{ height: 18 }} />
      </Scroll>
    </View>
  );
}

function BattleHome({ onCreate, onJoin, name, setName }) {
  const [joinCode, setJoinCode] = useState("");
  const [error, setError] = useState("");

  const handleJoin = () => {
    const codeInput = joinCode.trim().toUpperCase();
    if (codeInput.length !== 5) { setError("Enter the 5-character room code your friend shared."); return; }
    setError("");
    onJoin(codeInput);
  };

  return (
    <View style={{ flex: 1, minHeight: 0 }}>
      <AppHeader kicker="MULTIPLAYER" title="BATTLE" />
      <Scroll contentStyle={{ padding: 18, paddingTop: 16, gap: 16 }}>
        <Module label="YOUR NAME">
          <input
            aria-label="Display name"
            placeholder="Enter a display name"
            value={name}
            maxLength={16}
            onChange={(e) => setName(e.target.value)}
            style={styles.authInput}
          />
        </Module>

        <Module label="CREATE A ROOM" tone="teal">
          <Text style={styles.optDesc}>Start a room and share the code with up to {MAX_BATTLE_PLAYERS - 1} friends. Everyone races the same flags at the same time.</Text>
          <Touchable className="press" onPress={onCreate} style={styles.primaryBtn}>
            <Icon name="swords" size={17} color={T.onRed} stroke={2.2} />
            <Text style={styles.primaryTxt}>Create Battle</Text>
          </Touchable>
        </Module>

        <Module label="JOIN A ROOM" tone="red">
          <input
            aria-label="Room code"
            placeholder="ROOM CODE"
            value={joinCode}
            maxLength={5}
            onChange={(e) => setJoinCode(e.target.value.toUpperCase())}
            onKeyDown={(e) => { if (e.key === "Enter") handleJoin(); }}
            style={flat([styles.authInput, styles.battleCodeInput])}
          />
          <Touchable className="press" onPress={handleJoin} style={styles.secondaryBtn}>
            <Icon name="arrowRight" size={17} color={T.navy} stroke={2.4} />
            <Text style={styles.secondaryTxt}>Join Battle</Text>
          </Touchable>
          {error && <Text style={[styles.authNotice, { color: T.red }]}>{error}</Text>}
        </Module>
        <View style={{ height: 18 }} />
      </Scroll>
    </View>
  );
}

function Battle() {
  const [screen, setScreen] = useState("home"); // home | room
  const [room, setRoom] = useState(null); // { code, isHost, name }
  const [name, setName] = useState(() => {
    try { return window.localStorage.getItem(BATTLE_NAME_KEY) || randomGuestName(); }
    catch (_err) { return randomGuestName(); }
  });

  useEffect(() => {
    try { window.localStorage.setItem(BATTLE_NAME_KEY, name); } catch (_err) {}
  }, [name]);

  if (!hasSupabaseConfig || !hasSupabaseSdk) {
    return (
      <View style={{ flex: 1, minHeight: 0 }}>
        <AppHeader kicker="MULTIPLAYER" title="BATTLE" />
        <Scroll contentStyle={{ padding: 18, paddingTop: 16, gap: 14 }}>
          <Module label="UNAVAILABLE" tone="red">
            <Text style={styles.authNotice}>Battle mode needs Supabase configured. Set up supabase-config.js to enable live multiplayer.</Text>
          </Module>
        </Scroll>
      </View>
    );
  }

  const handleCreate = () => {
    const trimmed = name.trim() || randomGuestName();
    setName(trimmed);
    setRoom({ code: randomRoomCode(), isHost: true, name: trimmed });
    setScreen("room");
  };

  const handleJoin = (code) => {
    const trimmed = name.trim() || randomGuestName();
    setName(trimmed);
    setRoom({ code, isHost: false, name: trimmed });
    setScreen("room");
  };

  const handleLeave = () => {
    setRoom(null);
    setScreen("home");
  };

  return screen === "room" && room
    ? <BattleRoom key={`${room.code}-${room.isHost}`} code={room.code} isHost={room.isHost} name={room.name} onLeave={handleLeave} />
    : <BattleHome onCreate={handleCreate} onJoin={handleJoin} name={name} setName={setName} />;
}

/* ---------- APP ------------------------------------------------------------ */
function App() {
  const [tab, setTab] = useState("learn");
  const [quizScreen, setQuizScreen] = useState("home");
  const [config, setConfig] = useState({ type: "flagToName", scope: "world", difficulty: "medium", mode: "classic" });
  const [result, setResult] = useState(null);
  const [isNewBest, setIsNewBest] = useState(false);
  const [bestScores, setBestScores] = useState({}); // -> AsyncStorage on Expo
  const [srsWeights, setSrsWeights] = useState({});
  const [quizHistory, setQuizHistory] = useState([]);
  const [reviewHistory, setReviewHistory] = useState([]);
  const [missedCodes, setMissedCodes] = useState([]);
  const [runId, setRunId] = useState(0);
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(!supabaseClient);
  const [authModalDismissed, setAuthModalDismissed] = useState(false);
  const [storageReady, setStorageReady] = useState(false);
  const [syncStatus, setSyncStatus] = useState("Sign in to sync stats and progress.");
  const loadedStorageKey = useRef(null);
  const loadedRemoteUser = useRef(null);
  const saveTimer = useRef(null);

  useEffect(() => {
    if (!supabaseClient) return;
    let mounted = true;
    supabaseClient.auth.getSession()
      .then(({ data }) => {
        if (!mounted) return;
        setSession(data.session);
        setAuthReady(true);
      })
      .catch(() => setAuthReady(true));
    const { data } = supabaseClient.auth.onAuthStateChange((_event, nextSession) => {
      setSession(nextSession);
      setAuthReady(true);
    });
    return () => {
      mounted = false;
      data.subscription.unsubscribe();
    };
  }, []);

  const storageKey = `world-flags:${session && session.user ? session.user.id : "guest"}`;
  const userId = session && session.user ? session.user.id : null;

  useEffect(() => {
    setStorageReady(false);
    loadedRemoteUser.current = null;
    try {
      const raw = window.localStorage.getItem(storageKey);
      const saved = cleanProgress(raw ? JSON.parse(raw) : emptyProgress());
      setBestScores(saved.bestScores);
      setSrsWeights(saved.srsWeights);
      setQuizHistory(saved.quizHistory);
      setReviewHistory(saved.reviewHistory);
      setMissedCodes(saved.missedCodes);
    } catch (_err) {
      setBestScores({});
      setSrsWeights({});
      setQuizHistory([]);
      setReviewHistory([]);
      setMissedCodes([]);
    }
    loadedStorageKey.current = storageKey;
    setStorageReady(true);
  }, [storageKey]);

  useEffect(() => {
    if (!storageReady || loadedStorageKey.current !== storageKey) return;
    try {
      window.localStorage.setItem(storageKey, JSON.stringify({ bestScores, srsWeights, quizHistory, reviewHistory, missedCodes }));
    } catch (_err) {}
  }, [storageReady, storageKey, bestScores, srsWeights, quizHistory, reviewHistory, missedCodes]);

  useEffect(() => {
    if (!supabaseClient || !userId || !storageReady) {
      if (!userId) setSyncStatus("Sign in to sync stats and progress.");
      return;
    }

    let cancelled = false;
    setSyncStatus("Loading database progress...");
    supabaseClient
      .from(PROGRESS_TABLE)
      .select("progress")
      .eq("user_id", userId)
      .maybeSingle()
      .then(({ data, error }) => {
        if (cancelled) return;
        if (error) {
          setSyncStatus(`Database sync needs setup: ${error.message}`);
          return;
        }
        if (data && data.progress) {
          const saved = cleanProgress(data.progress);
          setBestScores(saved.bestScores);
          setSrsWeights(saved.srsWeights);
          setQuizHistory(saved.quizHistory);
          setReviewHistory(saved.reviewHistory);
          setMissedCodes(saved.missedCodes);
          try {
            window.localStorage.setItem(storageKey, JSON.stringify(saved));
          } catch (_err) {}
        }
        loadedRemoteUser.current = userId;
        if (data && data.progress) {
          setSyncStatus("Stats and progress loaded from Supabase.");
        } else {
          const progress = cleanProgress({ bestScores, srsWeights, quizHistory, reviewHistory, missedCodes });
          supabaseClient
            .from(PROGRESS_TABLE)
            .upsert({ user_id: userId, progress }, { onConflict: "user_id" })
            .then(({ error: saveError }) => {
              if (cancelled) return;
              setSyncStatus(saveError
                ? `Database save failed: ${saveError.message}`
                : "Stats and progress are now saving to Supabase.");
            });
        }
      });

    return () => { cancelled = true; };
  }, [userId, storageReady, storageKey]);

  useEffect(() => {
    if (!supabaseClient || !userId || loadedRemoteUser.current !== userId) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    const progress = cleanProgress({ bestScores, srsWeights, quizHistory, reviewHistory, missedCodes });
    saveTimer.current = setTimeout(() => {
      supabaseClient
        .from(PROGRESS_TABLE)
        .upsert({ user_id: userId, progress }, { onConflict: "user_id" })
        .then(({ error }) => {
          if (error) setSyncStatus(`Database save failed: ${error.message}`);
          else setSyncStatus(`Saved to Supabase at ${new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}.`);
        });
    }, 500);
    return () => {
      if (saveTimer.current) clearTimeout(saveTimer.current);
    };
  }, [userId, bestScores, srsWeights, quizHistory, reviewHistory, missedCodes]);

  const start = () => { setRunId((r) => r + 1); setQuizScreen("quiz"); setTab("quiz"); };
  const again = () => { setRunId((r) => r + 1); setQuizScreen("quiz"); setTab("quiz"); };
  const continueAsGuest = () => {
    setAuthModalDismissed(true);
    setTab("learn");
    setSyncStatus("Guest mode active. Stats and progress stay on this browser.");
  };

  const updateSrs = (code, multiplier) => {
    setSrsWeights((w) => {
      const current = w[code] || 1;
      const next = Math.max(0.1, Math.min(10, current * multiplier));
      return { ...w, [code]: next };
    });
  };

  const handleFlashcardReview = (country, rating, learnConfig) => {
    const multipliers = { tricky: 1.8, good: 0.7, easy: 0.35 };
    updateSrs(country.code, multipliers[rating]);
    const confidentReviews = reviewHistory.filter((review) =>
      review.code === country.code && (review.rating === "good" || review.rating === "easy")
    ).length + (rating === "good" || rating === "easy" ? 1 : 0);
    if (rating === "easy" || confidentReviews >= 2) {
      setMissedCodes((codes) => codes.filter((code) => code !== country.code));
    }
    setReviewHistory((history) => [{
      ts: Date.now(),
      code: country.code,
      rating,
      scope: scopeId(learnConfig.scope),
    }, ...history].slice(0, 1000));
  };

  const handleFinish = (r) => {
    const key = `${config.type}|${scopeId(config.scope)}|${config.difficulty}|${config.mode}`;
    const prev = bestScores[key];
    const newBest = (prev == null || r.score > prev) && r.total > 0;
    if (newBest) setBestScores((b) => ({ ...b, [key]: r.score }));
    if (config.mode !== "timeAttack") {
      setQuizHistory((history) => [{
        ts: Date.now(),
        score: r.score,
        total: r.total,
        type: config.type,
        scope: scopeId(config.scope),
        difficulty: config.difficulty,
        mode: config.mode,
      }, ...history].slice(0, 500));
      setMissedCodes((codes) => {
        const missed = r.answers.filter((a) => !a.correct).map((a) => a.target.code);
        const corrected = new Set(r.answers.filter((a) => a.correct).map((a) => a.target.code));
        const next = new Set(codes.filter((code) => !corrected.has(code) && BY_CODE[code]));
        missed.forEach((code) => {
          if (BY_CODE[code]) next.add(code);
        });
        return Array.from(next).slice(-500);
      });
    }
    setIsNewBest(newBest);
    setResult(r);
    setQuizScreen("results");
  };

  const quizContent = quizScreen === "quiz"
    ? <Quiz key={runId} config={config} onFinish={handleFinish} onQuit={() => setQuizScreen("home")} />
    : quizScreen === "results"
      ? <Results result={result} isNewBest={isNewBest} config={config} onAgain={again} onHome={() => setQuizScreen("home")} />
      : <Home config={config} setConfig={setConfig} onStart={start} bestScores={bestScores} />;

  return (
    <View style={styles.outer}>
      <View style={styles.app}>
        <View style={styles.mainPane}>
          <View style={[styles.tabPane, tab !== "learn" && styles.tabPaneHidden]}>
            <Learn srsWeights={srsWeights} missedCodes={missedCodes} onReview={handleFlashcardReview} />
          </View>
          <View style={[styles.tabPane, tab !== "quiz" && styles.tabPaneHidden]}>
            {quizContent}
          </View>
          <View style={[styles.tabPane, tab !== "battle" && styles.tabPaneHidden]}>
            <Battle />
          </View>
          <View style={[styles.tabPane, tab !== "account" && styles.tabPaneHidden]}>
            <Account session={session} authReady={authReady} quizHistory={quizHistory} reviewHistory={reviewHistory} srsWeights={srsWeights} />
          </View>
        </View>
        <BottomNav active={tab} onChange={setTab} />
        {authReady && !session && !authModalDismissed && (
          <AuthModal
            session={session}
            authReady={authReady}
            onClose={() => setAuthModalDismissed(true)}
            onGuest={continueAsGuest}
          />
        )}
      </View>
    </View>
  );
}
